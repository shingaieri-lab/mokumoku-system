      {/* メモ */}
      {lead.memo && (
        <div style={{padding:"8px 16px", borderBottom:"1px solid #bae6fd", background:"#e0f2fe", display:"flex", alignItems:"flex-start", gap:6}}>
          <span style={{fontSize:12, color:"#0369a1", flexShrink:0, marginTop:1}}>📝</span>
          <span style={{fontSize:12, color:"#1e3a5f", lineHeight:1.6, wordBreak:"break-word"}}>{lead.memo}</span>
        </div>
      )}

      {/* アクション履歴本体 */}
      <div style={{padding:"12px 16px"}}>
        <div style={S.histHeader}>
          <span style={S.sectionLabel}>📋 アクション履歴（{actions.length}件）</span>
          {!readOnly && <button onClick={() => { setShowAF(v=>!v); setEditingAction(null); }} style={S.btnAddAct}>
            {showAF ? "✕ 閉じる" : "＋ 記録する"}
          </button>}
        </div>

        {!readOnly && showAF && (
          <ActionForm
            onSave={a => {
              const actionWithRecorder = { ...a, recorded_by: currentUser?.name || "" };
              const patch = { actions: [actionWithRecorder, ...(lead.actions || [])] };
              if (a.nextDate) { patch.next_action_date = a.nextDate; patch.next_action_time = a.nextTime||""; patch.next_action = a.next||""; }
              onUpdate(patch);
              setShowAF(false);
            }}
            onClose={() => setShowAF(false)} />
        )}

        {actions.length === 0 && !showAF
          ? <div style={S.noAct}>まだアクションがありません</div>
          : <div style={{display:"flex", flexDirection:"column", gap:5, marginTop: showAF ? 12 : 0}}>
              {[...actions].sort((a,b) => ((b.date||"")+(b.time||"")).localeCompare((a.date||"")+(a.time||""))).map((a,i) => (
                editingAction?.id === a.id
                  ? <ActionForm key={a.id} initial={a}
                      onSave={updated => { onEditAction(a.id, updated); setEditingAction(null); }}
                      onClose={() => setEditingAction(null)} />
                  : <ActEntry key={a.id||i} a={a} onEdit={() => setEditingAction(a)} onDelete={() => onDeleteAction(a.id)} readOnly={readOnly}
                      onPushZoho={lead.zoho_lead_id && zohoAuthenticated ? () => pushActionToZoho(a) : null}
                      zohoPushing={zohoPushingId === a.id} />
              ))}
            </div>
        }
      </div>
    </div>
  );
}

const PALETTE = ["#7c3aed","#0369a1","#059669","#d97706","#dc2626","#0891b2","#db2777","#65a30d","#ea580c","#0f766e","#6d28d9","#1d4ed8","#047857","#b45309","#991b1b","#0e7490","#9d174d","#3f6212","#c2410c","#134e4a"];
const USER_COLORS = {};  // 動的に設定

const DEFAULT_ACCOUNTS = [];

function loadAccounts() {
  const saved = window.__appData?.accounts;
  if (!saved || saved.length === 0) return DEFAULT_ACCOUNTS;
  return saved;
}
function saveAccounts(accounts) {
  window.__appData.accounts = accounts;
  apiPost('/api/accounts', accounts);
  accounts.forEach(a => {
    USER_COLORS[a.name] = a.color;
    IS_COLORS[a.name] = { bg: a.color, text: a.color, border: a.color + "55" };
  });
}
// APIキーの優先順位: 個人設定（currentUser.xxx）> 管理者設定（shared.xxx）
// 個人設定が空の場合のみ管理者設定のキーが使われる
// ※ window.__appData.aiConfig はログイン時・saveAiConfig 時に更新される
function getEffectiveAiConfig(currentUser) {
  if (!currentUser) return {};
  // 共有設定（管理者が設定したもの）をフォールバックとして使用する
  // → メンバーが個別に設定していなくても管理者設定のClient IDが使われる
  const shared = window.__appData?.aiConfig || {};
  return {
    geminiKey: currentUser.geminiKey || shared.geminiKey || "",
    gmailClientId: currentUser.gmailClientId || shared.gmailClientId || ""
  };
}

function LoginScreen({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [userId, setUserId] = useState(""); const [password, setPassword] = useState(""); const [err, setErr] = useState(""); const [showPw, setShowPw] = useState(false);
  const [sForm, setSForm] = useState({ id:"", name:"", password:"", password2:"",color:PALETTE[0], email:"", inviteCode:"" });
  const [sErr, setSErr] = useState(""); const [sOk, setSOk] = useState(false); const [showSPw, setShowSPw] = useState(false);
  const [rForm, setRForm] = useState({ id:"", code:"", password:"", confirm:"" });
  const [rErr, setRErr] = useState(""); const [rOk, setROk] = useState(false); const [rLoading, setRLoading] = useState(false);
  const handleSignup = async () => {
    const { id, name, password, password2, color, email, inviteCode } = sForm;
    if (!id.trim() || !name.trim() || !email.trim() || !password.trim() || !password2.trim()) { setSErr("全項目入力してください"); return; }
    if (password !== password2) { setSErr("パスワードが一致しません"); return; }
    const newAccount = { id: id.trim(), name: name.trim(), password, role:"admin", color, email: email.trim(), inviteCode: inviteCode.trim() };
    try {
      const r = await fetch('/api/signup', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(newAccount) });
      if (!r.ok) { const e = await r.json(); setSErr(e.error||"作成に失敗しました"); return; }
      USER_COLORS[newAccount.name] = color;
      IS_COLORS[newAccount.name] = { bg:color, text:color, border:color+"55" };
      setSOk(true); setSErr("");
    } catch { setSErr("サーバーに接続できません"); }
  };
  const handleResetWithCode = async () => {
    if (!rForm.id.trim() || !rForm.password.trim() || !rForm.confirm.trim()) { setRErr("全項目入力してください"); return; }
    if (rForm.password !== rForm.confirm) { setRErr("パスワードが一致しません"); return; }
    setRLoading(true); setRErr("");
    try {
      const r = await fetch('/api/reset-password-direct', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: rForm.id.trim(), newPassword: rForm.password })
      });
      // r.ok を先にチェックし、エラー時のみ JSON を解析する
      // （サーバーがエラー時に JSON 以外を返しても catch に落ちない）
      if (!r.ok) {
        const data = await r.json().catch(() => ({}));
        setRErr(data.error || "エラーが発生しました");
      } else {
        setROk(true);
      }
    } catch { setRErr("サーバーに接続できません"); }
    setRLoading(false);
  };
  const handleLogin = async () => {
    try {
      const r = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ id:userId.trim(), password }) });
      if (!r.ok) { setErr("IDまたはパスワードが違います"); return; }
      const { token, account } = await r.json();
      localStorage.setItem('session_token', token);
      localStorage.setItem('current_user_id', account.id);
      const dataR = await fetch('/api/data', { headers: { 'x-session-token': token } });
      const data = dataR.ok ? await dataR.json() : null;
      if (data) {
        window.__appData = data;
        data.accounts.forEach(a => {
          USER_COLORS[a.name] = a.color;
          IS_COLORS[a.name] = { bg:a.color, text:a.color, border:a.color+"55" };
        });
      }
      onLogin(account, data);
    } catch { setErr("サーバーに接続できません"); }
  };
  const card = { background:"#fff", borderRadius:16, padding:"36px 32px", boxShadow:"0 8px 32px #0569691a", border:"1px solid #e2f0e8", width:360, maxWidth:"90vw" };
  const inp2 = { ...S.inp, marginBottom:0 };
  if (mode === "forgot") return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"linear-gradient(135deg,#f0faf5,#e8f5ee)" }}>
      <div style={card}>
        <div style={{ fontSize:20, fontWeight:900, color:"#174f35", marginBottom:6 }}>パスワードのリセット</div>
        <div style={{ fontSize:12, color:"#6a9a7a", marginBottom:20 }}>ユーザーIDと新しいパスワードを入力してください</div>
        {rOk ? (
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:32, marginBottom:8 }}>✅</div>
            <div style={{ fontWeight:700, color:"#059669", marginBottom:4 }}>パスワードを更新しました</div>
            <div style={{ fontSize:12, color:"#6a9a7a", marginBottom:20 }}>新しいパスワードでログインしてください</div>
            <button onClick={()=>{ setMode("login"); setROk(false); setRForm({id:"",code:"",password:"",confirm:""}); }} style={{ ...S.btnP, width:"100%" }}>ログインへ</button>
          </div>
        ) : (
          <>
            <div style={{ marginBottom:12 }}>
              <label style={{ ...S.lbl, display:"block", marginBottom:2 }}>ユーザーID</label>
              <input value={rForm.id} onChange={e=>setRForm(p=>({...p,id:e.target.value}))} placeholder="例：tanaka" style={inp2} />
            </div>
            <div style={{ marginBottom:12 }}>
              <label style={{ ...S.lbl, display:"block", marginBottom:2 }}>新しいパスワード</label>
              <div style={{ fontSize:11, color:"#6a9a7a", marginBottom:3 }}>8文字以上・英字と数字を含む</div>
              <input type="password" value={rForm.password} onChange={e=>setRForm(p=>({...p,password:e.target.value}))} style={inp2} />
            </div>
            <div style={{ marginBottom:16 }}>
              <label style={{ ...S.lbl, display:"block", marginBottom:2 }}>新しいパスワード（確認）</label>
              <input type="password" value={rForm.confirm} onChange={e=>setRForm(p=>({...p,confirm:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&handleResetWithCode()} style={inp2} />
            </div>
            {rErr && <div style={{ color:"#ef4444", fontSize:12, marginBottom:10 }}>⚠️ {rErr}</div>}
            <button onClick={handleResetWithCode} disabled={rLoading} style={{ ...S.btnP, width:"100%", marginBottom:10, opacity:rLoading?0.6:1 }}>{rLoading?"更新中...":"パスワードを更新"}</button>
            <button onClick={()=>{ setMode("login"); setRErr(""); }} style={{ width:"100%", background:"none", border:"none", color:"#6a9a7a", cursor:"pointer", fontSize:12, fontFamily:"inherit" }}>← ログインに戻る</button>
          </>
        )}
      </div>
    </div>
  );
  if (mode === "signup") return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"linear-gradient(135deg,#f0faf5,#e8f5ee)" }}>
      <div style={card}>
        <div style={{ fontSize:20, fontWeight:900, color:"#174f35", marginBottom:6 }}>新規アカウント作成</div>
        <div style={{ fontSize:12, color:"#6a9a7a", marginBottom:20 }}>招待コードを受け取った管理者のみ作成できます</div>
        {sOk ? (
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:32, marginBottom:8 }}>✅</div>
            <div style={{ fontWeight:700, color:"#059669", marginBottom:16 }}>アカウントを作成しました</div>
            <button onClick={()=>{ setMode("login"); setSOk(false); setSForm({id:"",name:"",password:"",password2:"",color:PALETTE[0],email:""}); }} style={{ ...S.btnP, width:"100%" }}>ログインへ</button>
          </div>
        ) : (
          <>
            <div style={{ marginBottom:12 }}>
              <label style={{ ...S.lbl, display:"block", marginBottom:2 }}>招待コード<span style={{ color:"#ef4444" }}>*</span></label>
              <input value={sForm.inviteCode} onChange={e=>setSForm(p=>({...p,inviteCode:e.target.value}))} placeholder="管理者から受け取ったコードを入力" style={inp2} />
            </div>
            <div style={{ marginBottom:12 }}>
              <label style={{ ...S.lbl, display:"block", marginBottom:2 }}>表示名<span style={{ color:"#ef4444" }}>*</span></label>
              <input value={sForm.name} onChange={e=>setSForm(p=>({...p,name:e.target.value}))} style={inp2} />
            </div>
            <div style={{ marginBottom:12 }}>
              <label style={{ ...S.lbl, display:"block", marginBottom:2 }}>メールアドレス<span style={{ color:"#ef4444" }}>*</span></label>
              <input value={sForm.email||""} onChange={e=>{ const v=e.target.value; const prefix=v.includes("@")?v.split("@")[0]:v; setSForm(p=>({...p,email:v,id:prefix})); }} style={inp2} />
            </div>
            <div style={{ marginBottom:12 }}>
              <label style={{ ...S.lbl, display:"block", marginBottom:2 }}>パスワード<span style={{ color:"#ef4444" }}>*</span></label>
              <div style={{ fontSize:11, color:"#6a9a7a", marginBottom:3 }}>8文字以上・英字と数字を含む</div>
              <div style={{ position:"relative" }}>
                <input type={showSPw?"text":"password"} value={sForm.password} onChange={e=>setSForm(p=>({...p,password:e.target.value}))} style={{ ...inp2, paddingRight:36 }} />
                <button onClick={()=>setShowSPw(v=>!v)} style={{ position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:14 }}>{showSPw?"🙈":"👁️"}</button>
              </div>
            </div>
            <div style={{ marginBottom:12 }}>
              <label style={{ ...S.lbl, display:"block", marginBottom:2 }}>パスワード（確認）<span style={{ color:"#ef4444" }}>*</span></label>
              <div style={{ fontSize:11, color:"#6a9a7a", marginBottom:3 }}>パスワード確認の為上記と同じ内容を入力</div>
              <input type={showSPw?"text":"password"} value={sForm.password2} onChange={e=>setSForm(p=>({...p,password2:e.target.value}))} style={inp2} />
            </div>
            <div style={{ marginBottom:12 }}>
              <label style={{ ...S.lbl, display:"block", marginBottom:6 }}>アイコン色<span style={{ color:"#ef4444" }}>*</span></label>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {PALETTE.map(c=><button key={c} onClick={()=>setSForm(p=>({...p,color:c}))} style={{ width:24, height:24, borderRadius:"50%", background:c, border: sForm.color===c?"2px solid #174f35":"2px solid #fff", cursor:"pointer" }} />)}
              </div>
            </div>
            {sErr && <div style={{ color:"#ef4444", fontSize:12, marginBottom:10 }}>{sErr}</div>}
            <button onClick={handleSignup} style={{ ...S.btnP, width:"100%", marginBottom:10 }}>アカウントを作成</button>
            <button onClick={()=>setMode("login")} style={{ width:"100%", background:"none", border:"none", color:"#6a9a7a", cursor:"pointer", fontSize:12, fontFamily:"inherit" }}>← ログインに戻る</button>
          </>
        )}
      </div>
    </div>
  );
  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"linear-gradient(135deg,#f0faf5,#e8f5ee)" }}>
      <div style={card}>
        <div style={{ textAlign:"center", marginBottom:24 }}>
          <div style={{ fontSize:32, marginBottom:8 }}>🏗️</div>
          <div style={{ fontSize:22, fontWeight:900, color:"#174f35" }}>IS進捗管理</div>
          <div style={{ fontSize:12, color:"#6a9a7a", marginTop:4 }}>ダンドリワーク インサイドセールス</div>
        </div>
        <div style={{ marginBottom:12 }}>
          <label style={{ ...S.lbl, display:"block", marginBottom:3 }}>ログインID</label>
          <input value={userId} onChange={e=>setUserId(e.target.value)} placeholder="例：tanaka" style={inp2} onKeyDown={e=>e.key==="Enter"&&handleLogin()} />
        </div>
        <div style={{ marginBottom:20 }}>
          <label style={{ ...S.lbl, display:"block", marginBottom:3 }}>パスワード</label>
          <div style={{ position:"relative" }}>
            <input type={showPw?"text":"password"} value={password} onChange={e=>setPassword(e.target.value)} style={{ ...inp2, paddingRight:36 }} onKeyDown={e=>e.key==="Enter"&&handleLogin()} />
            <button onClick={()=>setShowPw(v=>!v)} style={{ position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:14 }}>{showPw?"🙈":"👁️"}</button>
          </div>
        </div>
        {err && <div style={{ color:"#ef4444", fontSize:12, marginBottom:12 }}>{err}</div>}
        <button onClick={handleLogin} style={{ ...S.btnP, width:"100%", marginBottom:12 }}>ログイン</button>
        <button onClick={()=>{ setMode("signup"); setErr(""); }} style={{ width:"100%", background:"none", border:"1px solid #c0dece", borderRadius:8, padding:"8px", color:"#3d7a5e", cursor:"pointer", fontSize:12, fontFamily:"inherit", marginBottom:8 }}>新規アカウントを作成</button>
        <button onClick={()=>{ setMode("forgot"); setErr(""); }} style={{ width:"100%", background:"none", border:"none", color:"#9ca3af", cursor:"pointer", fontSize:11, fontFamily:"inherit" }}>パスワードを忘れた方はこちら</button>
      </div>
    </div>
  );
}

function AccountManager({ currentUser, onClose, inline, onUpdateProfile }) {
  const [accounts, setAccounts] = React.useState(loadAccounts);
  const [form, setForm] = React.useState({ id:"", name:"", password:"", role:"member", color:PALETTE[0], email:"", signature:"", isStaff:false });
  const [editingId, setEditingId] = React.useState(null);
  const [err, setErr] = React.useState("");
  const [lockedAccounts, setLockedAccounts] = React.useState({});
  const [inviteCode, setInviteCode] = React.useState(null);
  const [inviteLoading, setInviteLoading] = React.useState(false);

  React.useEffect(() => {
    // ロック中アカウントを取得
    fetch('/api/login-locks', { headers: { 'x-session-token': getToken() } })
      .then(r => r.ok ? r.json() : {})
      .then(setLockedAccounts)
      .catch(err => console.error('ロック情報取得失敗:', err));
  }, []);

  const handleUnlock = async (id) => {
    await fetch('/api/login-lock/' + id, { method:'DELETE', headers:{ 'x-session-token': getToken() } });
    setLockedAccounts(prev => { const n = {...prev}; delete n[id]; return n; });
  };


  const handleGenerateInvite = async () => {
    setInviteLoading(true);
    try {
      const r = await fetch('/api/invite', { method:'POST', headers:{ 'Content-Type':'application/json', 'x-session-token': getToken() } });
      const data = await r.json();
      setInviteCode(data.code);
    } catch { alert("招待コードの発行に失敗しました"); }
    setInviteLoading(false);
  };

  const save = (updated, editedId) => {
    setAccounts(updated);
    saveAccounts(updated);
    if (onUpdateProfile && editedId && editedId === currentUser?.id) {
      const updatedAccount = updated.find(a => a.id === editedId);
      if (updatedAccount) onUpdateProfile(updatedAccount);
    }
  };
  const handleSubmit = () => {
    if (!form.id.trim() || !form.name.trim()) { setErr("全項目入力してください"); return; }
    if (!editingId && !form.password.trim()) { setErr("パスワードを入力してください"); return; }
    // パスワードが入力されている場合は強度チェック（8文字以上・英字・数字を含む）
    if (form.password.trim()) {
      if (form.password.length < 8) { setErr("パスワードは8文字以上で入力してください"); return; }
      if (!/[a-zA-Z]/.test(form.password)) { setErr("パスワードに英字を含めてください"); return; }
      if (!/[0-9]/.test(form.password)) { setErr("パスワードに数字を含めてください"); return; }
    }
    if (accounts.some(a => a.id === form.id.trim() && a.id !== editingId)) { setErr("このIDは既に使われています"); return; }
    const updated = editingId !== null
      ? accounts.map(a => a.id === editingId ? { ...form, id: form.id.trim() } : a)
      : [...accounts, { ...form, id: form.id.trim() }];
    save(updated, editingId);
    setForm({ id:"", name:"", password:"", role:"member", color:PALETTE[0], email:"", signature:"", isStaff:false });
    setEditingId(null); setErr("");
  };
  const startEdit = async (a) => {
    setForm({ ...a, password: "" });
    setEditingId(a.id); setErr("");
    const r = await fetch('/api/account-password/' + a.id, { headers: { 'x-session-token': getToken() } });
    if (r.ok) { const data = await r.json(); setForm(p => ({ ...p, password: data.password })); }
  };
  const cancelEdit = () => { setForm({ id:"", name:"", password:"", role:"member", color:PALETTE[0], email:"", signature:"", isStaff:false }); setEditingId(null); setErr(""); };
  const deleteAccount = (id) => {
    if (id === currentUser.id) { alert("自分のアカウントは削除できません"); return; }
    if (!window.confirm("削除しますか？")) return;
    save(accounts.filter(a => a.id !== id), null);
  };

  const content = (
    <>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:16,fontWeight:800,color:"#174f35"}}>👥 アカウント管理</div>
          {!inline && <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#6a9a7a"}}>✕</button>}
        </div>
        <div style={{marginBottom:16,padding:"12px 14px",background:"#f0faf5",borderRadius:9,border:"1px solid #c0dece"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#174f35",marginBottom:8}}>🔗 招待コード発行</div>
          <div style={{fontSize:11,color:"#6a9a7a",marginBottom:8}}>コードは24時間有効・1回限り使用可能です</div>
          <button onClick={handleGenerateInvite} disabled={inviteLoading} style={{padding:"6px 14px",borderRadius:7,border:"none",background:"linear-gradient(135deg,#10b981,#059669)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",opacity:inviteLoading?0.6:1}}>
            {inviteLoading ? "発行中..." : "招待コードを発行"}
          </button>
          {inviteCode && (
            <div style={{marginTop:10,padding:"8px 12px",background:"#fff",borderRadius:7,border:"1px solid #10b981",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:"#059669",letterSpacing:2}}>{inviteCode}</span>
              <button onClick={()=>{navigator.clipboard.writeText(inviteCode); alert("コピーしました");}} style={{fontSize:11,padding:"3px 8px",borderRadius:5,border:"1px solid #c0dece",background:"#f0faf5",color:"#6a9a7a",cursor:"pointer",fontFamily:"inherit"}}>コピー</button>
              <button onClick={()=>setInviteCode(null)} style={{fontSize:11,padding:"3px 8px",borderRadius:5,border:"none",background:"none",color:"#9ca3af",cursor:"pointer"}}>✕</button>
            </div>
          )}
        </div>
        <div style={{marginBottom:20}}>
          {accounts.map(a => (
            <div key={a.id} style={{borderRadius:9,border:"1px solid #d8ede1",marginBottom:6,overflow:"hidden"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"#f0f5f2"}}>
                <span style={{width:28,height:28,borderRadius:"50%",background:a.color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,flexShrink:0}}>{a.name[0]}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#174f35",display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                    {a.name}
                    <span style={{fontSize:10,color:"#6a9a7a"}}>@{a.id}</span>
                    {a.role==="admin" && <span style={{fontSize:10,background:"#f3f4f6",color:"#6b7280",borderRadius:4,padding:"1px 6px",fontWeight:700}}>管理者</span>}
                    {a.isStaff && <span style={{fontSize:10,background:"#dcfce7",color:"#15803d",borderRadius:4,padding:"1px 6px",fontWeight:700}}>IS担当</span>}
                  </div>
                  {a.email && <div style={{fontSize:11,color:"#6a9a7a",marginTop:2}}>✉️ {a.email}</div>}
                </div>
                {lockedAccounts[a.id] && <button onClick={()=>handleUnlock(a.id)} title="ログインロックを解除" style={{fontSize:12,padding:"3px 10px",borderRadius:6,background:"#fef3c7",color:"#d97706",border:"1px solid #fcd34d",cursor:"pointer",fontFamily:"inherit"}}>🔓 解除</button>}
                <button onClick={()=>startEdit(a)} style={{padding:"3px 6px",borderRadius:6,background:"#f0fdf4",color:"#059669",border:"1px solid #86efac",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center"}} title="編集"><PencilIcon color="#059669"/></button>
                <button onClick={()=>deleteAccount(a.id)} style={{padding:"3px 6px",borderRadius:6,background:"#fef2f2",color:"#dc2626",border:"1px solid #fca5a5",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center"}} title="削除"><TrashIcon color="#dc2626"/></button>
              </div>
            </div>
          ))}
        </div>
        <div style={{background:"#f0f5f2",borderRadius:10,padding:"16px",border:"1px solid #d8ede1"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#174f35",marginBottom:12}}>{editingId ? "✏️ アカウント編集" : "＋ アカウント追加"}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            {[["ユーザーID","id","例：tanaka"],["表示名","name","例：田中"],["パスワード","password","パスワード"],["メールアドレス","email","例：tanaka@example.com"]].map(([lbl,key,ph])=>(
              <div key={key}>
                <label style={{fontSize:11,color:"#6a9a7a",display:"block",marginBottom:3}}>{lbl}{key==="password"&&editingId&&<span style={{fontWeight:400,color:"#9ca3af",marginLeft:4}}>（空欄のままにすると変更なし）</span>}</label>
                <input value={form[key]||""} onChange={e=>{ const v=e.target.value; if(key==="email"){ const prefix=v.includes("@")?v.split("@")[0]:v; setForm(p=>({...p,email:v,id:prefix})); } else if(key!=="id"){ setForm(p=>({...p,[key]:v})); } }}
                  placeholder={key==="password"&&editingId?"新しいパスワードを入力":ph} type={key==="email"?"email":"text"}
                  readOnly={key==="id"}
                  style={{width:"100%",padding:"7px 10px",borderRadius:7,border:"1px solid #c0dece",background:key==="id"?"#f0f5f2":"#fff",fontSize:12,color:key==="id"?"#6a9a7a":"#174f35",outline:"none",boxSizing:"border-box",fontFamily:"inherit",cursor:key==="id"?"not-allowed":"text"}} />
              </div>
            ))}
            <div>
              <label style={{fontSize:11,color:"#6a9a7a",display:"block",marginBottom:3}}>権限</label>
              <select value={form.role} onChange={e=>setForm(p=>({...p,role:e.target.value}))}
                style={{width:"100%",padding:"7px 10px",borderRadius:7,border:"1px solid #c0dece",background:"#fff",fontSize:12,color:"#174f35",outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}>
                <option value="member">メンバー</option>
                <option value="admin">管理者</option>
              </select>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,paddingTop:18}}>
              <input type="checkbox" id="isStaffCheck" checked={!!form.isStaff} onChange={e=>setForm(p=>({...p,isStaff:e.target.checked}))}
                style={{width:16,height:16,accentColor:"#10b981",cursor:"pointer"}} />
              <label htmlFor="isStaffCheck" style={{fontSize:12,color:"#174f35",cursor:"pointer",userSelect:"none"}}>
                IS担当の選択肢に表示する
              </label>
            </div>
          </div>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:11,color:"#6a9a7a",display:"block",marginBottom:3}}>✍️ メール署名</label>
            <textarea value={form.signature||""} onChange={e=>setForm(p=>({...p,signature:e.target.value}))}
              placeholder={"例：\n---\n田中 太郎\nダンドリワーク株式会社\nTEL: 03-xxxx-xxxx"}
              style={{width:"100%",padding:"7px 10px",borderRadius:7,border:"1px solid #c0dece",background:"#fff",fontSize:12,color:"#174f35",outline:"none",boxSizing:"border-box",fontFamily:"inherit",resize:"vertical",minHeight:72,lineHeight:1.5}} />
          </div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:11,color:"#6a9a7a",display:"block",marginBottom:5}}>アイコン色</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {PALETTE.map(c => (
                <button key={c} onClick={()=>setForm(p=>({...p,color:c}))}
                  style={{width:24,height:24,borderRadius:"50%",background:c,border:form.color===c?"3px solid #174f35":"2px solid #fff",cursor:"pointer",boxShadow:form.color===c?"0 0 0 2px "+c:"none"}} />
              ))}
            </div>
          </div>
          {err && <div style={{fontSize:12,color:"#dc2626",marginBottom:8}}>⚠️ {err}</div>}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            {editingId && <button onClick={cancelEdit} style={{padding:"7px 16px",borderRadius:7,border:"1px solid #c0dece",background:"#fff",color:"#6a9a7a",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>キャンセル</button>}
            <button onClick={handleSubmit} style={{padding:"7px 20px",borderRadius:7,border:"none",background:"linear-gradient(135deg,#10b981,#059669)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
              {editingId ? "更新" : "追加"}
            </button>
          </div>
        </div>
    </>
  );
  if (inline) return <div>{content}</div>;
  return (
    <div style={{position:"fixed", inset:0,background:"#0005", display:"flex",alignItems:"center", justifyContent:"center", zIndex:1000}}>
      <div style={{background:"#fff",borderRadius:16,padding:"28px 32px", width:"min(560px,95vw)", maxHeight:"85vh", overflowY:"auto", boxShadow:"0 8px 40px #0003",border:"1px solid #d8ede1"}}>
        {content}
      </div>
    </div>
  );
}

function addBusinessDays(dateStr, days) {
  const d = new Date((dateStr || TODAY) + "T00:00:00");
  let added = 0;
  while (added < days) {
    d.setDate(d.getDate() + 1);
    const dow = d.getDay();
    const ds = d.toISOString().split("T")[0];
    if (dow !== 0 && dow !== 6 && !JP_HOLIDAYS.has(ds)) added++;
  }
  return d.toISOString().split("T")[0];
}

// ─── Google Calendar 設定 ───────────────────────────────

function loadGCalConfig() {
  return window.__appData?.gcalConfig || {};
}
function saveGCalConfig(cfg) {
  window.__appData.gcalConfig = cfg;
  apiPost('/api/gcal-config', cfg);
}

function CalendarPage({ candidateSlots = [], onSlotsChange = ()=>{}, onGoEmail = ()=>{}, currentUser, leads = [] }) {
  const [cfg, setCfg] = useState(() => loadGCalConfig());
  const [showSetup, setShowSetup] = useState(false);
  const [editCfg, setEditCfg] = useState(() => loadGCalConfig());
  const accountCalendarIds = useMemo(() => {
    const accounts = loadAccounts();
    const ids = {};
    accounts.forEach(a => { if (a.calendarId) ids[a.name] = a.calendarId; });
    return ids;
  }, []);
  const mergedCalendarIds = useMemo(() => ({
    ...(cfg.calendarIds||{}),
    ...accountCalendarIds
  }), [cfg, accountCalendarIds]);

  // 検索条件
  const [selectedMembers, setSelectedMembers] = useState(["北原"]);
  const [dateFrom, setDateFrom] = useState(TODAY);
  const [dateTo, setDateTo]     = useState(() => {
    const d = new Date(TODAY + "T00:00:00"); d.setDate(d.getDate()+14);
    return d.toISOString().split("T")[0];
  });
  const [duration, setDuration] = useState(60);
  const [timeStart, setTimeStart] = useState("09:00");
  const [timeEnd,   setTimeEnd]   = useState("18:00");
  const [bufferBefore, setBufferBefore] = useState(30);
  const [bufferAfter,  setBufferAfter]  = useState(30);
  const [activeDays, setActiveDays] = useState([1,2,3,4,5]);
  const [includeHolidays, setIncludeHolidays] = useState(false);
  const [excludeTimes, setExcludeTimes] = useState([{from:"12:00",to:"13:00"}]);

  // 結果
  const [slots, setSlots]     = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState("");
  const [searched, setSearched] = useState(false);

  // カレンダー登録モーダル用
  const [showCalReg, setShowCalReg] = useState(false);
  const [calRegLeadId, setCalRegLeadId] = useState("");
  const [calRegCompany, setCalRegCompany] = useState("");
  const [calRegTitleTpl, setCalRegTitleTpl] = useState("仮WEB営1）【{{会社名}}様】");
  const [calRegLoading, setCalRegLoading] = useState(false);
  const [calRegToken, setCalRegToken] = useState(null);
  const [calRegResults, setCalRegResults] = useState([]);
  const [emailLeadId, setEmailLeadId] = useState("");

  const isConfigured = cfg.apiKey && Object.keys(mergedCalendarIds).length > 0;

  // Google Calendar freebusy APIを叩く
  const search = async () => {
    if (!isConfigured) { setShowSetup(true); return; }
    setLoading(true); setError(""); setSlots([]); setSearched(false);

    try {
      const timeMin = dateFrom + "T00:00:00+09:00";
      const timeMax = dateTo   + "T23:59:59+09:00";

      // 対象メンバーのカレンダーIDを収集
      const items = selectedMembers
        .map(m => mergedCalendarIds[m])
        .filter(Boolean)
        .map(id => ({ id }));

      if (items.length === 0) { setError("選択したメンバーのカレンダーIDが設定されていません"); setLoading(false); return; }

      const res = await fetch(
        `https://www.googleapis.com/calendar/v3/freeBusy?key=${cfg.apiKey}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ timeMin, timeMax, items })
        }
      );
      if (!res.ok) {
        const e = await res.json();
        throw new Error(e.error?.message || "APIエラー");
      }
      const data = await res.json();

      // 各メンバーの busy 時間帯を収集
      const busyByMember = {};
      selectedMembers.forEach(m => {
        const calId = mergedCalendarIds[m];
        if (!calId) return;
        busyByMember[m] = (data.calendars[calId]?.busy || []).map(b => ({
          start: new Date(b.start), end: new Date(b.end)
        }));
      });

      // 空き時間スロットを生成
      const found = [];
      const from = new Date(dateFrom + "T00:00:00+09:00");
      const to   = new Date(dateTo   + "T23:59:59+09:00");
      const [sh, sm] = timeStart.split(":").map(Number);
      const [eh, em] = timeEnd.split(":").map(Number);
      const bufBefore = bufferBefore * 60000; // ms
      const bufAfter  = bufferAfter  * 60000; // ms

      let cur = new Date(from);
      while (cur <= to) {
        const jstDate = new Date(cur.getTime() + 9*60*60000);
        const dow = jstDate.getUTCDay();
        const ds  = jstDate.toISOString().split("T")[0];
        if (activeDays.includes(dow) && (!JP_HOLIDAYS.has(ds) || includeHolidays)) {
          // この日の稼働時間内でスロットを探す
          let slotStart = new Date(cur);
          slotStart.setHours(sh, sm, 0, 0);
          const dayEnd = new Date(cur);
          dayEnd.setHours(eh, em, 0, 0);

          while (slotStart.getTime() + duration * 60000 <= dayEnd.getTime()) {
            const slotEnd = new Date(slotStart.getTime() + duration * 60000);
            // バッファ込みの占有時間帯
            const checkStart = new Date(slotStart.getTime() - bufBefore);
            const checkEnd   = new Date(slotEnd.getTime()   + bufAfter);
            // 除外時間帯チェック
            const inExclude = excludeTimes.some(ex => {
              const [exSh,exSm]=ex.from.split(":").map(Number);
              const [exEh,exEm]=ex.to.split(":").map(Number);
              const exS=new Date(slotStart);exS.setHours(exSh,exSm,0,0);
              const exE=new Date(slotStart);exE.setHours(exEh,exEm,0,0);
              return slotStart<exE&&slotEnd>exS;
            });
            // OR検索：空いているメンバーを列挙
            const freeMembers = inExclude ? [] : selectedMembers.filter(m => {
              const busy = busyByMember[m] || [];
              return !busy.some(b => checkStart < b.end && checkEnd > b.start);
            });
            if (freeMembers.length > 0) {
              found.push({ date: ds, start: slotStart.toTimeString().slice(0,5), end: slotEnd.toTimeString().slice(0,5), members: freeMembers });
              // 次スロットは商談終了＋後バッファ後から
              slotStart = new Date(slotEnd.getTime() + bufAfter);
            } else {
              slotStart = new Date(slotStart.getTime() + 30 * 60000);
            }
          }
        }
        cur.setDate(cur.getDate() + 1);
      }

      setSlots(found);
      setSearched(true);
    } catch(e) {
      setError("エラー: " + e.message);
    } finally {
      setLoading(false);
    }
  };

  const copySlot = (slot) => {
    const txt = `${slot.date} ${slot.start}〜${slot.end}（${slot.members.join("・")}）`;
    navigator.clipboard?.writeText(txt).catch(()=>{});
    alert("コピーしました：\n" + txt);
  };
  const isSlotSelected = (slot) => candidateSlots.some(s=>s.date===slot.date&&s.start===slot.start&&s.end===slot.end);
  const toggleCandidateSlot = (slot) => {
    if (isSlotSelected(slot)) {
      onSlotsChange(candidateSlots.filter(s=>!(s.date===slot.date&&s.start===slot.start&&s.end===slot.end)));
    } else if (candidateSlots.length < 3) {
      onSlotsChange([...candidateSlots, slot]);
    }
  };

  const resolvedCalTitle = calRegTitleTpl.replace(/\{\{会社名\}\}/g, calRegCompany);

  const openCalReg = () => {
    setCalRegTitleTpl("仮WEB営1）【{{会社名}}様】");
    const preselectedLead = leads.find(l => l.id === emailLeadId);
    setCalRegLeadId(emailLeadId);
    setCalRegCompany(preselectedLead?.company || "");
    setCalRegResults([]);
    setShowCalReg(true);
  };

  const registerToCalendar = async () => {
    const aiCfg = window.__appData?.aiConfig || {};
    const clientId = currentUser?.gmailClientId || aiCfg.gmailClientId || "";
    if (!clientId) { alert(currentUser?.role === "admin" ? "設定 > APIキー設定 で Gmail Client ID を入力してください" : "管理者にGmail OAuth Client IDの設定を依頼してください"); return; }
    if (candidateSlots.length === 0) return;
    setCalRegLoading(true); setCalRegResults([]);
    try {
      // 有効期限内のトークンがあれば再利用、期限切れなら再取得する
      let tokenObj = calRegToken;
      if (!isTokenValid(tokenObj)) {
        if (!window.google?.accounts?.oauth2) {
          await new Promise((res, rej) => {
            // 既にスクリプトがDOMにあれば重複追加しない
            if (document.querySelector('script[src*="accounts.google.com/gsi/client"]')) { res(); return; }
            const s = document.createElement('script');
            s.src = 'https://accounts.google.com/gsi/client';
            s.onload = res; s.onerror = rej;
            document.head.appendChild(s);
          });
          await new Promise(r => setTimeout(r, 500));
        }
        const rawToken = await new Promise((res, rej) => {
          const client = window.google.accounts.oauth2.initTokenClient({
            client_id: clientId,
            scope: 'https://www.googleapis.com/auth/calendar.events',
            callback: (resp) => {
              if (resp.error) {
                if (resp.error === 'redirect_uri_mismatch' || resp.error === 'invalid_client') {
                  rej(new Error(`OAuth設定エラー: Google Cloud ConsoleのOAuthクライアントの「承認済みJavaScriptオリジン」に "${window.location.origin}" を追加してください。`));
                } else { rej(new Error(resp.error)); }
              } else { res(resp.access_token); }
            },
            error_callback: (err) => {
              if (err.type === 'popup_blocked_by_browser') {
                rej(new Error('ポップアップがブロックされました。ブラウザのポップアップブロックを解除してください。'));
              } else {
                rej(new Error(`OAuth設定エラー: Google Cloud ConsoleのOAuthクライアントの「承認済みJavaScriptオリジン」に "${window.location.origin}" が登録されているか確認してください。`));
              }
            }
          });
          client.requestAccessToken();
        });
        tokenObj = { token: rawToken, expiresAt: Date.now() + 55 * 60 * 1000 };
        setCalRegToken(tokenObj);
      }
      const token = tokenObj.token;
      const title = resolvedCalTitle;
      const results = [];
      for (const slot of candidateSlots) {
        const slotMembers = slot.members?.length > 0 ? slot.members : selectedMembers;
        const missingMembers = slotMembers.filter(m => !mergedCalendarIds[m]);
        missingMembers.forEach(member => results.push({ slot, member, success: false, error: "カレンダーIDなし" }));
        const attendees = slotMembers
          .filter(m => mergedCalendarIds[m])
          .map(m => ({ email: mergedCalendarIds[m] }));
        try {
          const startDT = `${slot.date}T${slot.start}:00+09:00`;
          const endDT = `${slot.date}T${slot.end}:00+09:00`;
          const resp = await fetch(
            `https://www.googleapis.com/calendar/v3/calendars/primary/events?sendUpdates=none`,
            { method: "POST", headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
              body: JSON.stringify({ summary: title, start: { dateTime: startDT, timeZone: "Asia/Tokyo" }, end: { dateTime: endDT, timeZone: "Asia/Tokyo" }, attendees }) }
          );
          if (!resp.ok) {
            const err = await resp.json();
            if (err.error?.code === 401) { setCalRegToken(null); throw new Error('認証の期限が切れました。再度お試しください。'); }
            slotMembers.forEach(member => results.push({ slot, member, success: false, error: err.error?.message || "登録失敗" }));
          } else {
            slotMembers.forEach(member => results.push({ slot, member, success: true }));
          }
        } catch(e) { slotMembers.forEach(member => results.push({ slot, member, success: false, error: e.message })); }
      }
      setCalRegResults(results);
    } catch(e) {
      setCalRegToken(null);
      alert("エラー：" + e.message);
    } finally {
      setCalRegLoading(false);
    }
  };

  const members = getSalesMembers();
  const inp2 = { ...S.inp, marginBottom:0 };

  return (
    <div className="cal-page" style={{...S.page, width:"60vw", maxWidth:"100%"}}>
      <Header title="📅 商談候補日検索" sub="Google Calendarの空き時間を自動検索します">
        <button onClick={()=>{ setEditCfg(loadGCalConfig()); setShowSetup(v=>!v); }}
          style={{...S.btnSec, fontSize:12}}>⚙️ カレンダー設定</button>
      </Header>

      {/* 設定パネル */}
      {showSetup && (
        <div style={{...S.card, marginBottom:16, border:"1px solid #fde68a", background:"#fffbeb"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#d97706",marginBottom:12}}>⚙️ Google Calendar API 設定</div>

          {/* 設定手順 */}
          <div style={{background:"#fff",border:"1px solid #fde68a",borderRadius:8,padding:"12px 14px",marginBottom:14,fontSize:12,color:"#92400e",lineHeight:1.8}}>
            <div style={{fontWeight:700,marginBottom:6}}>📋 設定手順</div>
            <div>① <a href="https://console.cloud.google.com/" target="_blank" rel="noopener noreferrer" style={{color:"#0284c7"}}>Google Cloud Console</a> でプロジェクトを作成</div>
            <div>② 「APIとサービス」→「ライブラリ」→ <b>Google Calendar API</b> を有効化</div>
            <div>③ 「認証情報」→「APIキーを作成」→ APIキーをコピー</div>
            <div>④ 各担当者のGoogleカレンダーを開き「設定」→「カレンダーのID」をコピー<br/>　　（例：<code style={{background:"#fef9c3",padding:"1px 4px",borderRadius:3}}>abcdef@gmail.com</code> または <code style={{background:"#fef9c3",padding:"1px 4px",borderRadius:3}}>xxx@group.calendar.google.com</code>）</div>
            <div>⑤ カレンダーの「共有設定」で <b>「一般公開して誰でも閲覧できるようにする」</b> をON（または「予定の詳細を表示」を許可）</div>
          </div>

          {/* カレンダー登録機能の追加設定 */}
          <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"12px 14px",marginBottom:14,fontSize:12,color:"#1e40af",lineHeight:1.9}}>
            <div style={{fontWeight:700,marginBottom:6}}>📅 「カレンダーに登録」機能を使う場合の追加設定（管理者が1回だけ実施）</div>
            <div>⑥ 「認証情報」→「OAuthクライアントID」を作成（種類：<b>ウェブアプリケーション</b>）</div>
            <div>　　→ 「承認済みJavaScriptオリジン」に <code style={{background:"#dbeafe",padding:"1px 4px",borderRadius:3}}>{window.location.origin}</code> を追加</div>
            <div>⑦ 「OAuthの同意画面」でスコープに <code style={{background:"#dbeafe",padding:"1px 4px",borderRadius:3}}>https://www.googleapis.com/auth/calendar.events</code> を追加</div>
            <div>⑧ 作成した <b>クライアントID</b> を ⚙️設定 &gt; APIキー設定 の「Gmail Client ID」欄に入力すれば全員が使用可能になります</div>
            <div style={{marginTop:8,padding:"6px 10px",background:"#dbeafe",borderRadius:6,color:"#1e40af"}}>
              💡 各営業は初回のみGoogleの認証ポップアップで「許可」を押すだけです。個別の設定は不要です。
            </div>
            <div style={{marginTop:6,color:"#1d4ed8",fontWeight:600}}>※ 空き時間の検索（freeBusy）は APIキーのみで動作します。カレンダーへの予定登録にはOAuth認証（Client ID）が必要です。</div>
          </div>

          <div style={{marginBottom:10}}>
            <label style={{...S.lbl}}>Google Calendar APIキー</label>
            <input value={editCfg.apiKey||""} onChange={e=>setEditCfg(p=>({...p,apiKey:e.target.value}))}
              placeholder="AIzaSy..." style={inp2} />
          </div>

          <div style={{marginBottom:4}}>
            <label style={{...S.lbl}}>担当者ごとのカレンダーID</label>
          </div>
          {members.map(m => (
            <div key={m} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <span style={{fontSize:12,fontWeight:600,color:"#174f35",minWidth:70}}>{m}</span>
              <input value={(editCfg.calendarIds||{})[m]||""}
                onChange={e=>setEditCfg(p=>({...p,calendarIds:{...(p.calendarIds||{}),[m]:e.target.value}}))}
                placeholder="例：tanaka@gmail.com"
                style={{...inp2,flex:1}} />
            </div>
          ))}

          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:12}}>
            <button onClick={()=>setShowSetup(false)} style={S.btnSec}>閉じる</button>
            <button onClick={()=>{ saveGCalConfig(editCfg); setCfg(editCfg); setShowSetup(false); }} style={S.btnP}>保存</button>
          </div>
        </div>
      )}

      {!isConfigured && !showSetup && (
        <div style={{...S.card,textAlign:"center",padding:"32px",marginBottom:16}}>
          <div style={{fontSize:32,marginBottom:10}}>⚙️</div>
          <div style={{fontSize:14,color:"#2d6b4a",marginBottom:8}}>まずカレンダーAPIの設定が必要です</div>
          <button onClick={()=>setShowSetup(true)} style={S.btnP}>設定を開く</button>
        </div>
      )}

      {/* 検索フォーム */}
      {isConfigured && (
        <div style={S.card}>
          <div style={{fontSize:13,fontWeight:700,color:"#174f35",marginBottom:12}}>🔍 空き時間を検索</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div>
              <label style={S.lbl}>期間（開始）</label>
              <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={S.inp} />
            </div>
            <div>
              <label style={S.lbl}>期間（終了）</label>
              <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={S.inp} />
            </div>
            <div>
              <label style={S.lbl}>時間帯（開始）</label>
              <select value={timeStart} onChange={e=>setTimeStart(e.target.value)} style={S.inp}>
                {Array.from({length:24},(_,i)=>`${String(i).padStart(2,"0")}:00`).map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <label style={S.lbl}>時間帯（終了）</label>
              <select value={timeEnd} onChange={e=>setTimeEnd(e.target.value)} style={S.inp}>
                {Array.from({length:24},(_,i)=>`${String(i).padStart(2,"0")}:00`).map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <label style={S.lbl}>商談時間</label>
              <select value={duration} onChange={e=>setDuration(Number(e.target.value))} style={S.inp}>
                <option value={30}>30分</option>
                <option value={60}>1時間</option>
                <option value={90}>1時間30分</option>
                <option value={120}>2時間</option>
              </select>
            </div>
            <div>
              <label style={S.lbl}>前後バッファ（移動・準備時間）</label>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <select value={bufferBefore} onChange={e=>setBufferBefore(Number(e.target.value))} style={{...S.inp,flex:1}}>
                  <option value={0}>前：なし</option>
                  <option value={15}>前：15分</option>
                  <option value={30}>前：30分</option>
                  <option value={60}>前：60分</option>

                  <option value={60}>後：60分</option>

          {(bufferBefore > 0 || bufferAfter > 0) && (
            <div style={{fontSize:11,color:"#6a9a7a",marginBottom:10,background:"#f0f5f2",borderRadius:6,padding:"6px 10px"}}>

          <div style={{marginBottom:12}}>
            <label style={S.lbl}>対象曜日</label>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
              {[["日",0,"#ef4444"],["月",1,"#3b82f6"],["火",2,"#3b82f6"],["水",3,"#3b82f6"],["木",4,"#3b82f6"],["金",5,"#3b82f6"],["土",6,"#8b5cf6"]].map(([label,val,col])=>{
                const active=activeDays.includes(val);
                return <button key={val} onClick={()=>setActiveDays(prev=>active?prev.filter(d=>d!==val):[...prev,val].sort())} style={{width:40,height:40,borderRadius:20,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700,background:active?col:"#f0f5f2",color:active?"#fff":col,transition:"all 0.15s"}}>
                  {label}
                </button>;
              })}
              <button onClick={()=>setIncludeHolidays(v=>!v)} style={{height:40,padding:"0 12px",borderRadius:20,border:includeHolidays?"none":"1.5px dashed #f59e0b",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700,background:includeHolidays?"#f59e0b":"#f0f5f2",color:includeHolidays?"#fff":"#f59e0b",transition:"all 0.15s",whiteSpace:"nowrap"}}>
                祝日
              </button>
            </div>
            {activeDays.length===0&&<div style={{fontSize:11,color:"#ef4444",marginTop:4}}>⚠️ 曜日を1つ以上選択</div>}
          </div>
          {/* 対象外時間帯 */}
          <div style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <label style={{...S.lbl,marginBottom:0}}>🚫 対象外時間帯</label>
              <button onClick={()=>setExcludeTimes(prev=>[...prev,{from:"12:00",to:"13:00"}])} style={{fontSize:11,padding:"4px 10px",borderRadius:7,border:"none",background:"linear-gradient(135deg,#10b981,#059669)",color:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>＋ 追加</button>
            </div>
            {excludeTimes.length===0&&<div style={{fontSize:11,color:"#9ca3af",padding:"6px 10px",background:"#f9fafb",borderRadius:6,border:"1px dashed #d1d5db"}}>対象外時間帯なし</div>}
            {excludeTimes.map((ex,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,background:"#fff8f0",border:"1px solid #fde68a",borderRadius:8,padding:"8px 12px"}}>
                <input type="time" value={ex.from} onChange={e=>setExcludeTimes(prev=>prev.map((t,j)=>j===i?{...t,from:e.target.value}:t))} style={{...S.inp,marginBottom:0,padding:"4px 8px",width:90,fontSize:12}}/>
                <span style={{fontSize:12,color:"#6b7280"}}>〜</span>
                <input type="time" value={ex.to} onChange={e=>setExcludeTimes(prev=>prev.map((t,j)=>j===i?{...t,to:e.target.value}:t))} style={{...S.inp,marginBottom:0,padding:"4px 8px",width:90,fontSize:12}}/>
                <span style={{fontSize:11,color:"#6b7280"}}>は除外</span>
                <button onClick={()=>setExcludeTimes(prev=>prev.filter((_,j)=>j!==i))} style={{marginLeft:"auto",background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:5,cursor:"pointer",padding:"3px 6px",display:"flex",alignItems:"center"}} title="削除"><TrashIcon color="#dc2626"/></button>
              </div>
            ))}
          </div>
          <div style={{marginBottom:12}}>
            <label style={S.lbl}>対象メンバー（複数選択可）</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {members.map(m => {
                const active = selectedMembers.includes(m);
                const hasId = !!mergedCalendarIds[m];
                return (
                  <button key={m} onClick={()=>setSelectedMembers(prev=>
                    active ? prev.filter(x=>x!==m) : [...prev,m]
                  )} style={{fontSize:12,padding:"5px 12px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",
                    background: active ? "#10b98133" : "transparent",
                    color: active ? "#059669" : "#6a9a7a",
                    border: `1px solid ${active ? "#10b98166" : "#c0dece"}`,
                    fontWeight: active ? 700 : 400,
                    opacity: hasId ? 1 : 0.5,
                  }}>
                    {m}{!hasId && " ⚠️"}
                  </button>
                );
              })}
            </div>
            {selectedMembers.some(m=>!mergedCalendarIds[m]) && (
              <div style={{fontSize:11,color:"#f59e0b",marginTop:4}}>⚠️ カレンダーID未設定のメンバーは除外されます</div>
            )}
          </div>

          <button onClick={search} disabled={loading}
            style={{...S.btnP, width:"100%", opacity:loading?0.6:1}}>
            {loading ? "🔍 検索中..." : "🔍 空き時間を検索"}
          </button>
          {error && <div style={{color:"#ef4444",fontSize:12,marginTop:8}}>{error}</div>}
        </div>
      )}

      {/* 検索結果 */}
      {searched && (
        <div style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
            <div style={{fontSize:13,fontWeight:700,color:"#174f35"}}>
              検索結果：<span style={{color:"#10b981"}}>{slots.length}件</span> の空き時間
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {candidateSlots.length > 0 && (
                <span style={{fontSize:12,color:"#059669",fontWeight:700,background:"#ecfdf5",border:"1px solid #10b98144",borderRadius:8,padding:"4px 10px"}}>
                  ✅ {candidateSlots.length}件選択中
                </span>
              )}
              <button onClick={()=>onSlotsChange([])} disabled={candidateSlots.length===0}
                style={{fontSize:11,padding:"4px 10px",borderRadius:7,border:"1px solid #c0dece",background:"#f0f5f2",color:"#6a9a7a",cursor:candidateSlots.length===0?"default":"pointer",fontFamily:"inherit",opacity:candidateSlots.length===0?0.4:1}}>
                選択をクリア
              </button>
              <button onClick={()=>onGoEmail(emailLeadId)} disabled={candidateSlots.length===0}
                style={{fontSize:12,padding:"6px 14px",borderRadius:8,border:"none",background:candidateSlots.length===0?"#d1d5db":"linear-gradient(135deg,#10b981,#059669)",color:"#fff",cursor:candidateSlots.length===0?"default":"pointer",fontFamily:"inherit",fontWeight:700}}>
                📧 メールに使う
              </button>
              <button onClick={openCalReg} disabled={candidateSlots.length===0}
                style={{fontSize:12,padding:"6px 14px",borderRadius:8,border:"none",background:candidateSlots.length===0?"#d1d5db":"linear-gradient(135deg,#3b82f6,#2563eb)",color:"#fff",cursor:candidateSlots.length===0?"default":"pointer",fontFamily:"inherit",fontWeight:700}}>
                📅 カレンダーに登録
              </button>
            </div>
          </div>
          {candidateSlots.length > 0 && (
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
              <span style={{fontSize:11,color:"#6a9a7a",fontWeight:600,whiteSpace:"nowrap"}}>対象リード：</span>
              <div style={{flex:1,minWidth:180,maxWidth:280}}>
                <LeadCombobox leads={leads} value={emailLeadId} onChange={setEmailLeadId}
                  placeholder="会社名・担当者名で検索" inputStyle={{...S.inp,padding:"5px 10px",fontSize:12}} darkMode={false} />
              </div>
              {emailLeadId && <span style={{fontSize:11,color:"#059669",fontWeight:700}}>✅ {leads.find(l=>l.id===emailLeadId)?.company||""}</span>}
            </div>
          )}
          {candidateSlots.length === 0 && (
            <div style={{fontSize:11,color:"#6b7280",background:"#f9fafb",borderRadius:7,padding:"6px 10px",marginBottom:10,border:"1px dashed #d1d5db"}}>
              日時ボタンをクリックして候補日を選択（最大3つ）→「📧 メールに使う」でメールテンプレートに反映
            </div>
          )}
          {slots.length === 0 ? (
            <div style={{textAlign:"center",color:"#6a9a7a",padding:"24px",fontSize:14}}>
              指定期間に空き時間が見つかりませんでした
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:400,overflowY:"auto"}}>
              {/* 日付でグループ化 */}
              {[...new Set(slots.map(s=>s.date))].map(date => (
                <div key={date}>
                  <div style={{fontSize:12,fontWeight:700,color:"#6a9a7a",marginBottom:4,marginTop:8}}>
                    {date}（{["日","月","火","水","木","金","土"][new Date(date+"T00:00:00").getDay()]}）
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {slots.filter(s=>s.date===date).map((slot,i)=>{
                      const selected = isSlotSelected(slot);
                      const maxed = candidateSlots.length >= 3 && !selected;
                      return (
                        <button key={i} onClick={()=>toggleCandidateSlot(slot)} disabled={maxed}
                          style={{fontSize:12,padding:"6px 12px",borderRadius:8,cursor:maxed?"not-allowed":"pointer",fontFamily:"inherit",fontWeight:600,
                            border:selected?"2px solid #10b981":"1px solid #10b98144",
                            background:selected?"#10b981":"#ecfdf5",
                            color:selected?"#fff":"#059669",
                            opacity:maxed?0.4:1,
                            transition:"all 0.15s"}}>
                          {selected ? "✓ " : ""}{slot.start}〜{slot.end}{selectedMembers.length > 1 && slot.members && slot.members.length > 0 ? `（${slot.members.join("・")}）` : ""}
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* カレンダー登録モーダル */}
      {showCalReg && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}
          onClick={e=>{if(e.target===e.currentTarget){setShowCalReg(false);setCalRegLeadId("");}}}>
          <div style={{background:"#fff",borderRadius:16,padding:28,width:500,maxWidth:"95vw",boxShadow:"0 8px 40px rgba(0,0,0,0.2)",maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{fontSize:16,fontWeight:800,color:"#174f35",marginBottom:18}}>📅 Googleカレンダーに登録</div>

            <div style={{marginBottom:12}}>
              <label style={{...S.lbl}}>会社名<span style={{fontWeight:400,color:"#6b7280",fontSize:11,marginLeft:6}}>（{"{{会社名}}"} に代入されます）</span></label>
              {leads.length > 0 && (
                <div style={{marginBottom:6}}>
                  <LeadCombobox
                    leads={leads}
                    value={calRegLeadId}
                    onChange={id => {
                      setCalRegLeadId(id);
                      const lead = leads.find(l => l.id === id);
                      if (lead) setCalRegCompany(lead.company || "");
                    }}
                    placeholder="リードから検索・選択"
                    inputStyle={S.inp}
                    darkMode={false}
                  />
                </div>
              )}
              <input value={calRegCompany} onChange={e=>setCalRegCompany(e.target.value)}
                placeholder="例：株式会社〇〇" style={S.inp} />
            </div>

            <div style={{marginBottom:16}}>
              <label style={{...S.lbl}}>タイトルテンプレート</label>
              <input value={calRegTitleTpl} onChange={e=>setCalRegTitleTpl(e.target.value)} style={S.inp} />
              <div style={{fontSize:11,color:"#6b7280",marginTop:4,background:"#f0f5f2",borderRadius:6,padding:"5px 10px"}}>
                プレビュー：<span style={{fontWeight:700,color:"#174f35"}}>{resolvedCalTitle || "（タイトル未入力）"}</span>
              </div>
            </div>

            <div style={{marginBottom:16}}>
              <label style={{...S.lbl}}>登録する候補日（{candidateSlots.length}件）</label>
              {candidateSlots.map((slot,i)=>(
                <div key={i} style={{fontSize:12,background:"#ecfdf5",border:"1px solid #10b98144",borderRadius:8,padding:"7px 12px",marginBottom:6,color:"#174f35",display:"flex",alignItems:"center",gap:8}}>
                  <span>📅 {slot.date}（{["日","月","火","水","木","金","土"][new Date(slot.date+"T00:00:00").getDay()]}）{slot.start}〜{slot.end}</span>
                  {slot.members?.length > 0 && <span style={{color:"#6a9a7a",fontSize:11}}>担当：{slot.members.join("・")}</span>}
                </div>
              ))}
            </div>

            {calRegResults.length > 0 && (
              <div style={{marginBottom:16}}>
                <label style={{...S.lbl}}>登録結果</label>
                {calRegResults.map((r,i)=>(
                  <div key={i} style={{fontSize:12,borderRadius:8,padding:"5px 10px",marginBottom:4,
                    background:r.success?"#ecfdf5":"#fef2f2",
                    border:`1px solid ${r.success?"#10b98144":"#fca5a544"}`,
                    color:r.success?"#065f46":"#b91c1c"}}>
                    {r.success ? "✅" : "❌"} {r.slot.date} {r.slot.start}〜{r.slot.end}
                    {r.member && <span style={{marginLeft:6,fontWeight:600}}>{r.member}</span>}
                    ：{r.success ? "登録完了" : r.error}
                  </div>
                ))}
              </div>
            )}

            <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}>
              <button onClick={()=>{setShowCalReg(false);setCalRegLeadId("");}} style={S.btnSec}>閉じる</button>
              <button onClick={registerToCalendar}
                disabled={calRegLoading || !resolvedCalTitle.trim()}
                style={{...S.btnP,opacity:(calRegLoading||!resolvedCalTitle.trim())?0.6:1,
                  cursor:(calRegLoading||!resolvedCalTitle.trim())?"not-allowed":"pointer"}}>
                {calRegLoading ? "⏳ 登録中..." : calRegResults.length > 0 && calRegResults.every(r=>r.success) ? "✅ 登録済み（再登録）" : "📅 カレンダーに登録する"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Splash() {
  return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#f0f5f2",color:"#6a9a7a"}}>読み込み中...</div>;
}
function Header({ title, sub, children }) {
  return (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:10}}>
      <div>
        <h1 style={{margin:0,fontSize:22,fontWeight:800,color:"#174f35",letterSpacing:"-0.02em"}}>{title}</h1>
        {sub && <p style={{margin:"4px 0 0",fontSize:13,color:"#3d7a5e"}}>{sub}</p>}
      </div>
      {children}
    </div>
  );
}
function Card({ title, children }) {
  return (
    <div style={S.card}>
      {title && <div style={S.cardTitle}>{title}</div>}
      {children}
    </div>
  );
}
function KPI({ icon, label, value, unit, color, sub }) {
  return (
    <div style={{...S.kpiCard, borderTop:`3px solid ${color}`}}>
      <span style={{fontSize:22}}>{icon}</span>
      <div>
        <div style={{fontSize:12,color:"#6a9a7a",marginBottom:3}}>{label}</div>
        <div style={{fontSize:24,fontWeight:800,color:"#174f35",letterSpacing:"-0.02em"}}>
          {value}{unit&&<span style={{fontSize:13,fontWeight:400,marginLeft:2}}>{unit}</span>}
        </div>
        {sub && <div style={{fontSize:12,color,marginTop:2}}>{sub}</div>}
      </div>
    </div>
  );
}
function SrcBadge({ src, small }) {
  const c = getSourceColor(src, 0);
  return (
    <span style={{background:c+"1a",color:c,border:`1px solid ${c}44`,borderRadius:5, padding:small?"2px 7px":"3px 10px",fontSize:small?11:12,fontWeight:600,whiteSpace:"nowrap"}}>
      {src}
    </span>
  );
}
function Badge({ color, label }) {
  return <span style={{background:color+"1a",color,border:`1px solid ${color}44`,borderRadius:6,padding:"4px 12px",fontSize:13,fontWeight:700}}>{label}</span>;
}
function Chip({ label, color="#6a9a7a" }) {
  return <span style={{background:color+"1a",color,border:`1px solid ${color}33`,borderRadius:5,padding:"3px 10px",fontSize:12}}>{label}</span>;
}
function IF({ label, v }) {
  return (
    <div style={{background:"#ffffff",borderRadius:6,padding:"8px 10px"}}>
      <div style={{fontSize:11,color:"#3d7a5e",marginBottom:2}}>{label}</div>
      <div style={{fontSize:13,color:"#1f5c40"}}>{v||"—"}</div>
    </div>
  );
}
function Note({ label, text }) {
  if (!text) return null;
  return (
    <div style={{background:"#d8ede1",border:"1px solid #c0dece",borderRadius:8,overflow:"hidden"}}>
      <div style={{padding:"6px 12px",background:"#162032",borderBottom:"1px solid #334155",fontSize:11,color:"#6a9a7a",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>
      <p style={{margin:0,padding:"10px 12px",fontSize:13.5,color:"#2d6b4a",lineHeight:1.75}}>{text}</p>
    </div>
  );
}
function Row2({ children }) {
  return <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>{children}</div>;
}
function Field({ label, value, onChange, type="text", placeholder }) {
  return (
    <div>
      <label style={S.lbl}>{label}</label>
      <input type={type} value={value} onChange={e=>onChange(e.target.value)}
        placeholder={placeholder} style={S.inp} />
    </div>
  );
}

    class ErrorBoundary extends React.Component {
      constructor(props){super(props);this.state={hasError:false,error:null};}
      static getDerivedStateFromError(e){return{hasError:true,error:e};}
      render(){
        if(this.state.hasError){
          return <div style={{padding:40,textAlign:"center",fontFamily:"'Noto Sans JP',sans-serif"}}>
            <div style={{fontSize:40,marginBottom:16}}>⚠️</div>
            <div style={{fontSize:18,fontWeight:700,color:"#dc2626",marginBottom:8}}>エラーが発生しました</div>
            <div style={{fontSize:13,color:"#6b7280",marginBottom:24,maxWidth:400,margin:"0 auto 24px"}}>{String(this.state.error?.message||"予期しないエラーが発生しました")}</div>
            <button onClick={()=>this.setState({hasError:false,error:null})} style={{padding:"8px 24px",borderRadius:8,background:"#059669",color:"#fff",border:"none",fontSize:14,fontWeight:700,cursor:"pointer"}}>再試行</button>
          </div>;
        }
        return this.props.children;
      }
    }
    const root=ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App/></ErrorBoundary>);
  </script>
