          </div>
          <div style={{ marginBottom: 8 }}>
            <label style={{ fontSize: 11, fontWeight: 700, color: "#6a9a7a", display: "block", marginBottom: 4 }}>APIキーを貼り付け</label>
            <input value={calApiKey} onChange={e => setCalApiKey(e.target.value)} placeholder="AIzaSy..." style={inp} />
          </div>
          <div style={{ display: "flex", gap: 8, justifyContent: "space-between", marginTop: 20 }}>
            <button onClick={() => setStep(1)} style={btnS}>← 戻る</button>
            <button onClick={() => setStep(3)} disabled={!calApiKey.trim()} style={{ ...btnP, opacity: calApiKey.trim() ? 1 : 0.5 }}>次へ →</button>
          </div>
        </div>
      </WizardOverlay>
    );
    if (step === 3) return (
      <WizardOverlay onDismiss={dismiss}>
        <div style={{ ...cardStyle, maxWidth: 560 }}>
          <WizardStepBar current={3} labels={labels} />
          <div style={{ fontSize: 15, fontWeight: 800, color: "#174f35", marginBottom: 12 }}>👥 メンバーのカレンダーIDを入力する</div>
          <div style={{ background: "#fff7ed", borderRadius: 8, padding: "12px 14px", fontSize: 12, color: "#92400e", marginBottom: 14, border: "1px solid #fde68a", lineHeight: 1.8 }}>
            <b>📌 カレンダーIDの確認方法（各メンバーが自分で確認）</b><br />
            Googleカレンダー → 左の自分の名前「⋮」→「設定と共有」→「カレンダーのID」をコピー<br />
            <b>⚠️ 「予定の詳細を表示」を「全員」に共有設定を変更してください</b>
          </div>
          <div style={{ maxHeight: 220, overflowY: "auto", marginBottom: 12 }}>
            {members.map(m => (
              <div key={m} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                <span style={{ fontSize: 12, fontWeight: 600, color: "#174f35", minWidth: 64, flexShrink: 0 }}>{m}</span>
                <input value={(calIds || {})[m] || ""} onChange={e => setCalIds(p => ({ ...p, [m]: e.target.value }))} placeholder="例：tanaka@gmail.com" style={{ ...inp, fontSize: 12 }} />
              </div>
            ))}
          </div>
          <div style={{ display: "flex", gap: 8, justifyContent: "space-between" }}>
            <button onClick={() => setStep(2)} style={btnS}>← 戻る</button>
            <button onClick={() => setStep(4)} disabled={members.length > 0 && Object.values(calIds).filter(v => v.trim()).length === 0} style={{ ...btnP, opacity: (members.length === 0 || Object.values(calIds).filter(v => v.trim()).length > 0) ? 1 : 0.5 }}>次へ →</button>
          </div>
        </div>
      </WizardOverlay>
    );
    const filledIds = Object.entries(calIds).filter(([, v]) => v.trim());
    return (
      <WizardOverlay onDismiss={dismiss}>
        <div style={cardStyle}>
          <WizardStepBar current={4} labels={labels} />
          <div style={{ fontSize: 15, fontWeight: 800, color: "#174f35", marginBottom: 12 }}>✅ カレンダー設定完了！</div>
          <div style={{ background: "#d1fae5", borderRadius: 8, padding: "16px", marginBottom: 16, fontSize: 12, color: "#059669" }}>
            <div style={{ fontWeight: 700, marginBottom: 6 }}>保存する内容</div>
            <div>✅ APIキー：設定済み</div>
            {filledIds.map(([name, id]) => <div key={name}>✅ {name}：{id}</div>)}
          </div>
          <div style={{ display: "flex", gap: 8, justifyContent: "space-between" }}>
            <button onClick={() => setStep(3)} style={btnS}>← 戻る</button>
            <button onClick={() => {
              const filteredIds = Object.fromEntries(Object.entries(calIds).filter(([, v]) => v.trim()));
              saveGCalConfig({ apiKey: calApiKey.trim(), calendarIds: filteredIds });
              go("overview");
            }} style={btnP}>保存して完了</button>
          </div>
        </div>
      </WizardOverlay>
    );
  }

  return null;
}

function App() {
  const isMobile = useIsMobile();
  const [page, setPage] = useState(() => sessionStorage.getItem('current_page') || "dashboard");
  const navigate = (p) => { sessionStorage.setItem('current_page', p); setPage(p); };
  const [settingsTab, setSettingsTab] = useState(null);
  const [dashFilter, setDashFilter] = useState(null);
  const [leads, setLeads] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [masterVer, setMasterVer] = useState(0);
  const [currentUser, setCurrentUser] = useState(null);
  const [aiConfig, setAiConfig] = useState({});
  const selectUser = (account, data) => {
    setCurrentUser(account);
    USER_COLORS[account.name] = account.color;
    localStorage.setItem("current_user_id", account.id);
    if (data) {
      const l = data.leads || [];
      const migrated = l.map(lead => lead.portal_type === "請求" ? { ...lead, portal_type: "一括請求" } : lead);
      // React 18 では非同期コールバック内の複数 setState も自動バッチ処理されるため
      // setLeads → setAiConfig → setMasterVer の順で呼んでも中間レンダリングは発生しない
      setLeads(migrated);
      setAiConfig(data.aiConfig || {});
      setMasterVer(v => v + 1);
    }
  };
  const logout = () => {
    const token = localStorage.getItem('session_token');
    if (token) apiPost('/api/logout', {});
    localStorage.removeItem('current_user_id');
    localStorage.removeItem('session_token');
    window.__appData = { accounts: [], leads: [], masterSettings: null, aiConfig: {}, gcalConfig: {}, emailTpls: null, zohoConfig: null, zohoAuthenticated: false };
    setCurrentUser(null);
    setLeads([]);
    setAiConfig({});
  };
  const updateMyProfile = (profile) => {
    const originalId = currentUser.id;
    const accounts = loadAccounts();
    const newAccounts = accounts.map(a => a.id === originalId ? { ...a, ...profile } : a);
    saveAccounts(newAccounts);
    const updated = newAccounts.find(a => a.id === (profile.id || originalId)) || { ...currentUser, ...profile };
    setCurrentUser(updated);
    USER_COLORS[updated.name] = updated.color;
    IS_COLORS[updated.name] = { bg: updated.color, text: updated.color, border: updated.color + "55" };
    localStorage.setItem("current_user_id", updated.id);
  };
  const [candidateSlots, setCandidateSlots] = useState([]);
  const [calendarLeadId, setCalendarLeadId] = useState("");
  const [aiOpenLeadId, setAiOpenLeadId] = useState(null);
  const [showWizard, setShowWizard] = useState(false);
  // APIキーの優先順位: 個人設定（currentUser.geminiKey）> 管理者設定（aiConfig.geminiKey）
  // 個人設定が空の場合のみ管理者設定のキーが使われる
  // ※ aiConfig は React state（saveAiConfig で更新）、window.__appData.aiConfig と常に同期している
  const effectiveAiConfig = useMemo(() => ({
    ...aiConfig,
    geminiKey: currentUser?.geminiKey || aiConfig.geminiKey || "",
    gmailClientId: currentUser?.gmailClientId || aiConfig.gmailClientId || ""
  }), [currentUser, aiConfig]);
  const apiKey = effectiveAiConfig.geminiKey;
  const saveAiConfig = (cfg) => {
    setAiConfig(cfg);
    window.__appData.aiConfig = cfg;
    apiPost('/api/ai-config', cfg);
  };

  useEffect(() => {
    async function init() {
      const token = localStorage.getItem('session_token');
      const savedId = localStorage.getItem('current_user_id');
      if (token && savedId) {
        try {
          const r = await fetch('/api/data', { headers: { 'x-session-token': token } });
          if (r.ok) {
            const data = await r.json();
            window.__appData = data;
            data.accounts.forEach(a => {
              USER_COLORS[a.name] = a.color;
              IS_COLORS[a.name] = { bg: a.color, text: a.color, border: a.color + "55" };
            });
            const user = data.accounts.find(a => a.id === savedId);
            if (user) {
              setCurrentUser(user);
              USER_COLORS[user.name] = user.color;
            } else {
              localStorage.removeItem('current_user_id');
            }
            setAiConfig(data.aiConfig || {});
            setMasterVer(v => v + 1);
          } else if (r.status === 401) {
            localStorage.removeItem('session_token');
            localStorage.removeItem('current_user_id');
          }
        } catch {}
      }
      const l = await loadLeads();
      const migrated = l.map(lead => lead.portal_type === "請求" ? { ...lead, portal_type: "一括請求" } : lead);
      setLeads(migrated);
      setLoaded(true);
      if (migrated.some((lead,i) => lead.portal_type !== l[i].portal_type)) saveLeads(migrated);
    }
    init();
  }, []);

  const mut = (next) => { setLeads(next); saveLeads(next); };
  const addLead    = (l)       => mut([l, ...leads]);
  const updateLead = (id, p)   => mut(leads.map(l => l.id === id ? { ...l, ...p } : l));
  const deleteLead = (id)      => mut(leads.filter(l => l.id !== id));
  const addAction  = (id, act) => mut(leads.map(l => l.id === id
    ? { ...l, actions: [{ ...act, recorded_by: currentUser?.name || "" }, ...(l.actions || [])] } : l));

  if (!loaded) return <Splash />;
  if (!currentUser) return <LoginScreen onLogin={selectUser} />;

  return (
    <div style={{...S.root, flexDirection: isMobile ? "column" : "row"}}>
      <style>{CSS}</style>
      <Nav page={page} setPage={navigate} setSettingsTab={setSettingsTab} count={leads.length} currentUser={currentUser} onLogout={logout} onUpdateProfile={updateMyProfile} isMobile={isMobile} />
      {showWizard && <SetupWizard currentUser={currentUser} onUpdateProfile={updateMyProfile} onSave={saveAiConfig} aiConfig={effectiveAiConfig} onClose={() => setShowWizard(false)} />}
      <main style={{...S.main, paddingBottom: isMobile ? 65 : 0}}>
        {page === "dashboard" && <Dashboard leads={leads} currentUser={currentUser} onNavigate={(f)=>{ setDashFilter(f); navigate("leads"); }} masterVer={masterVer} isMobile={isMobile} />}
        {page === "trend"     && <Trend leads={leads} />}
        {page === "leads"     && <LeadList leads={leads} initialFilter={dashFilter} onFilterConsumed={()=>setDashFilter(null)} initialOpenId={aiOpenLeadId} onOpenIdConsumed={()=>setAiOpenLeadId(null)} onAdd={addLead} onUpdate={updateLead} onDelete={deleteLead} onAddAction={addAction} currentUser={currentUser} isMobile={isMobile} readOnly={false}
          onBulkAdd={newLeads => { const next = [...newLeads, ...leads]; setLeads(next); saveLeads(next); }} />}
        {page === "ai"        && <AIPage leads={leads} onAdd={addLead} onUpdate={updateLead} onAddAction={addAction} goLeads={(leadId) => { setAiOpenLeadId(leadId||null); navigate("leads"); }} goCalendar={() => navigate("calendar")} aiConfig={effectiveAiConfig} currentUser={currentUser} isMobile={isMobile} />}
        {page === "calendar"  && <CalendarPage candidateSlots={candidateSlots} onSlotsChange={setCandidateSlots} onGoEmail={(leadId)=>{ setCalendarLeadId(leadId); navigate("email"); }} currentUser={currentUser} leads={leads} />}
        {page === "settings"  && <SettingsPage aiConfig={effectiveAiConfig} onSave={saveAiConfig} currentUser={currentUser} onUpdateProfile={updateMyProfile} initialTab={settingsTab} onLeadsChange={setLeads} onMasterSave={() => setMasterVer(v => v + 1)} onOpenWizard={() => setShowWizard(true)} />}
        {page === "email"     && <EmailPage leads={leads} onUpdate={updateLead} currentUser={currentUser} candidateSlots={candidateSlots} initialLeadId={calendarLeadId} isMobile={isMobile} />}
      </main>
    </div>
  );
}

function Dashboard({ leads, currentUser, onNavigate, masterVer, isMobile }) {
  // 日付を "YYYY-MM" 形式に正規化（スラッシュ・ハイフン両対応）
  const toYM = (dateStr) => {
    if (!dateStr) return "";
    // "2026-03-11" → "2026-03"
    if (/^\d{4}-\d{2}/.test(dateStr)) return dateStr.slice(0,7);
    // "2026/3/11" or "2026/03/11" → "2026-03"
    const m = dateStr.match(/^(\d{4})[/-](\d{1,2})/);
    if (m) return m[1] + "-" + String(m[2]).padStart(2,"0");
    return "";
  };
  const [month, setMonth] = useState(THIS_MONTH);
  const months = useMemo(() => {
    const set = new Set(leads.map(l => toYM(l.date)).filter(Boolean));
    return [...set].sort().reverse();
  }, [leads]);
  useEffect(() => {
    if (months.length > 0 && !months.includes(month)) setMonth(months[0]);
  }, [months]);
  const fl = month ? leads.filter(l => toYM(l.date) === month) : leads;

  const bySrc    = s => fl.filter(l => l.source === s);
  const isAppt   = l => ["日程調整中","商談確定"].includes(l.status);
  const isWon    = l => l.status === "商談確定";
  const rate     = (a,b) => b ? (a/b*100).toFixed(1)+"%" : "—";

  const portal   = fl.filter(l => !!l.portal_site);
  const isCharged = l => !l.charge_applied;
  const cost     = portal.filter(isCharged).reduce((s,l) => s + getPortalPrice(l.portal_site, l.portal_type), 0);
  const applied  = portal.filter(l => l.charge_applied);

  const todayActions = leads.filter(l => l.next_action_date === TODAY && l.is_member === currentUser?.name);
  const overdueActions = leads.filter(l => l.next_action_date && l.next_action_date < TODAY && l.is_member === currentUser?.name);

  const kpiItems = [
    { icon:"📥", label:"総反響数",   value:fl.length+"件",          color:"#10b981", bg:"linear-gradient(135deg,#0ecf8a,#059669)", sub:`MQL ${fl.filter(l=>l.mql==="MQL").length}件 (${rate(fl.filter(l=>l.mql==="MQL").length, fl.length)})`, filter:{ month } },
    { icon:"📅", label:"商談設定数", value:fl.filter(isAppt).length+"件",color:"#f59e0b", bg:"linear-gradient(135deg,#fbbf24,#d97706)", sub:`商談化率 ${rate(fl.filter(isAppt).length, fl.length)}`, filter:{ month, statuses:["日程調整中","商談確定"] } },
    { icon:"📒", label:"課金見込み", value:"¥"+cost.toLocaleString(),color:"#8b5cf6", bg:"linear-gradient(135deg,#a78bfa,#7c3aed)", sub:`対象外申請済 ${applied.length}件`, filter:{ month, hasPortal: true } },

const CSV_COLUMNS = {
  "会社名":               "company",
  "担当者名":             "contact",
  "反響日":               "date",
  "流入元":               "source",
  "ポータルサイト名":     "portal_site",
  "ポータル種別":         "portal_type",
  "課金対象外申請済":     "charge_applied",
  "ステータス":           "status",
  "IS担当":               "is_member",
  "商談日":               "meeting_date",
  "商談時刻":             "meeting_time",
  "担当営業":             "sales_member",
  "Zoho CRM URL":         "zoho_url",
  "HP URL":               "hp_url",
  "IS確度":               "is_accuracy",
  "ネクストアクション日": "next_action_date",
  "ネクストアクション時刻":"next_action_time",
  "ネクストアクションメモ":"next_action",
  "MQL判定":              "mql",
};

function parseCSVLine(line) {
  const fields = []; let cur = ""; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === "," && !inQ) { fields.push(cur.trim()); cur = ""; }
    else { cur += c; }
  }
  fields.push(cur.trim());
  return fields;
}

// 日付を YYYY-MM-DD に正規化
// 対応フォーマット: "YYYY-MM-DD"（そのまま）、"YYYY/M/D" or "YYYY-M-D"（ゼロ埋め変換）
// CSVインポート（parseCSV）・リード編集・ダッシュボード（toYM）すべてでこの関数を経由するため
// 保存データの日付フォーマットは常に YYYY-MM-DD に統一される
function normalizeDate(s) {
  if (!s) return "";
  s = s.trim();
  // 既に YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // YYYY/M/D or YYYY-M-D（月・日が1桁でもOK）
  const m = s.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})$/);
  if (m) return `${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`;
  return s;
}

function parseCSV(text) {
  const lines = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n").filter(l=>l.trim());
  if (lines.length < 1) return { leads:[], errors:["データがありません"] };

  let headerIdx = lines.findIndex(l => l.includes("会社名"));

  const FIXED_COLS = ["company","contact","date","source","portal_site","portal_type",
    "charge_applied","status","is_member","mql","meeting_date","meeting_time",
    "sales_member","zoho_url","next_action_date","next_action_time","next_action"];

  const leads = []; const errors = [];

  if (headerIdx < 0) {
    for (let i = 0; i < lines.length; i++) {
      const vals = parseCSVLine(lines[i]);
      if (!vals[0] || vals[0].includes("フォーマット") || vals[0].startsWith("★") || vals[0].startsWith("会社名")) continue;
      const row = {};
      FIXED_COLS.forEach((k,j) => { row[k] = (vals[j]||"").trim(); });
      if (!row.company) continue;
      row.id = uid(); row.actions = []; row.created_at = Date.now();
      row.charge_applied = row.charge_applied === "TRUE" || row.charge_applied === "true";
      if (!getStatuses().includes(row.status)) row.status = getStatuses()[0] || "新規";
      if (!MQL_OPTIONS.includes(row.mql)) row.mql = "非MQL";
      row.date = normalizeDate(row.date);
      row.next_action_date = normalizeDate(row.next_action_date);
      row.meeting_date = normalizeDate(row.meeting_date);
      leads.push(row);
    }
    if (leads.length === 0) return { leads:[], errors:["データ行が見つかりません。フォーマットのヘッダー行（会社名・担当者名…）が必要です"] };
    return { leads, errors };
  }

  const headers = parseCSVLine(lines[headerIdx]).map(h => h.replace(" ★",""));
  for (let i = headerIdx+1; i < lines.length; i++) {
    const vals = parseCSVLine(lines[i]);
    const row = {};
    headers.forEach((h,j) => { const key = CSV_COLUMNS[h]; if (key) row[key] = (vals[j]||"").trim(); });
    if (!row.company) { errors.push(`${i+1}行目: 会社名が空のためスキップ`); continue; }
    row.id = uid(); row.actions = []; row.created_at = Date.now();
    row.charge_applied = row.charge_applied === "TRUE" || row.charge_applied === "true";
    if (!getStatuses().includes(row.status)) row.status = getStatuses()[0] || "新規";
    if (!MQL_OPTIONS.includes(row.mql)) row.mql = "非MQL";
    row.date = normalizeDate(row.date);
    row.next_action_date = normalizeDate(row.next_action_date);
    row.meeting_date = normalizeDate(row.meeting_date);
    leads.push(row);
  }
  return { leads, errors };
}

function CSVImport({ onImport, onClose, result }) {
  const [preview, setPreview] = useState(null);
  const [errors,  setErrors]  = useState([]);
  const [dragging,setDragging]= useState(false);
  const [encoding,setEncoding]= useState("");

  const handleFile = (file) => {
    if (!file) return;
    const binReader = new FileReader();
    binReader.onload = e => {
      const buf = e.target.result;
      const bytes = new Uint8Array(buf);
      const isUTF8BOM = bytes[0]===0xEF && bytes[1]===0xBB && bytes[2]===0xBF;
      // SJIS判定: リードバイト（先行バイト）の次のバイトも SJIS トレイルバイト範囲か確認する
      // リードバイトのみで判定すると UTF-8 3バイト文字（E3〜E9）と誤判定する恐れがあるため
      let sjisScore = 0;
      for (let i = 0; i < Math.min(bytes.length - 1, 499); i++) {
        const b = bytes[i];
        const isLeadByte = (b >= 0x81 && b <= 0x9F) || (b >= 0xE0 && b <= 0xFC);
        if (isLeadByte) {
          const next = bytes[i + 1];
          // SJIS トレイルバイト: 0x40〜0x7E または 0x80〜0xFC（0x7F は除外）
          const isTrailByte = (next >= 0x40 && next <= 0x7E) || (next >= 0x80 && next <= 0xFC);
          if (isTrailByte) { sjisScore++; i++; } // トレイルバイトもスキップ
        }
      }
      const enc = isUTF8BOM ? "UTF-8" : sjisScore > 3 ? "Shift-JIS" : "UTF-8";
      const txtReader = new FileReader();
      txtReader.onload = ev => {
        const { leads, errors } = parseCSV(ev.target.result);
        setPreview(leads); setErrors(errors);
        setEncoding(enc);
      };
      txtReader.readAsText(file, enc);
    };
    binReader.readAsArrayBuffer(file);
  };

  return (
    <div style={S.importPanel}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:14,color:"#174f35"}}>📥 CSVインポート</div>
        <div style={{display:"flex", gap:8, alignItems:"center"}}>
          <button onClick={() => {
            const header = ["会社名","担当者名","反響日","流入元","ポータルサイト名","ポータル種別","課金対象外申請済","ステータス","IS担当","MQL判定","商談日","商談時刻","担当営業","Zoho CRM URL","ネクストアクション日","ネクストアクション時刻","ネクストアクションメモ"].join(",");
            const example = ["株式会社サンプル","田中 太郎","2026-03-01","HP","","","FALSE","新規","新谷","","","","","","",""].join(",");
            const note = "# 流入元: HP / ポータルサイト / 電話  |  ステータス: 新規 / 架電済 / 日程調整中 / 商談確定 / 育成対象外 / ナーチャリング";
            const csv = "\uFEFF" + note + "\n" + header + "\n" + example;
            const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = "dandori_import_template.csv"; a.click();
            URL.revokeObjectURL(url);
          }}
            style={{fontSize:11,padding:"5px 12px",borderRadius:7,border:"1px solid #10b98155", background:"#ecfdf5",color:"#059669",cursor:"pointer",fontFamily:"inherit",fontWeight:600, display:"flex",alignItems:"center", gap:4}}>
            ⬇️ テンプレDL
          </button>
          <button onClick={onClose} style={S.closeX}>✕</button>
        </div>
      </div>

      {!preview && !result && (
        <div
          onDragOver={e=>{e.preventDefault();setDragging(true);}}
          onDragLeave={()=>setDragging(false)}
          onDrop={e=>{e.preventDefault();setDragging(false);handleFile(e.dataTransfer.files[0]);}}
          style={{border:`2px dashed ${dragging?"#10b981":"#c0dece"}`,borderRadius:10, padding:"32px 20px", textAlign:"center",background: dragging?"#d1fae522":"transparent", cursor:"pointer", transition:"all 0.15s"}}
          onClick={()=>document.getElementById("csv-input").click()}>
          <div style={{fontSize:32,marginBottom:8}}>📂</div>
          <div style={{fontSize:14,color:"#2d6b4a"}}>CSVファイルをドロップ</div>
          <div style={{fontSize:12,color:"#3d7a5e", marginTop:4}}>またはクリックしてファイルを選択</div>
          <input id="csv-input" type="file" accept=".csv" style={{display:"none"}}
            onChange={e=>handleFile(e.target.files[0])} />
        </div>

      {encoding && (

      {errors.length > 0 && (

      {preview && !result && (

          <div style={{display:"flex", gap:8, justifyContent:"flex-end"}}>
            <button onClick={()=>{setPreview(null);setErrors([]);}} style={S.btnSec}>やり直す</button>
            <button onClick={()=>onImport(preview)} style={S.btnP}>
              ✅ {preview.length}件をインポートする
            </button>
          </div>
        </div>
      )}

      {result && (
        <div style={{textAlign:"center",padding:"20px 0"}}>
          <div style={{fontSize:32,marginBottom:8}}>🎉</div>
          <div style={{fontSize:15,fontWeight:700,color:"#10b981"}}>{result.count}件のインポート完了！</div>
          <button onClick={onClose} style={{...S.btnSec, marginTop:12}}>閉じる</button>
        </div>
      )}
    </div>
  );
}

function LeadList({ leads, onAdd, onUpdate, onDelete, onAddAction, onBulkAdd, initialFilter, onFilterConsumed, initialOpenId, onOpenIdConsumed, currentUser, readOnly, isMobile }) {
  const [showForm, setShowForm]     = useState(false);
  const [editing, setEditing]       = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [importResult, setImportResult] = useState(null);
  const [fStatuses, setFStatuses] = useState(new Set());
  const [fSource, setFSrc] = useState("");
  const [fPortal, setFPortal] = useState("");
  const [fMonth, setFMonth] = useState("");
  const [fNextAction, setFNextAction] = useState(""); // "today" | "overdue" | ""
  const [fIS, setFIS] = useState("");
  const [fQ, setFQ] = useState("");
  const [fHasPortal, setFHasPortal] = useState(false);
  const [sort, setSort] = useState("fixed");
  const [sortDir, setSortDir] = useState("asc");
  const [openId, setOpenId] = useState(null);

  useEffect(() => {
    if (!initialFilter) return;
    if (initialFilter.month)          setFMonth(initialFilter.month);
    if (initialFilter.source)         setFSrc(initialFilter.source);
    if (initialFilter.statuses)       setFStatuses(new Set(initialFilter.statuses));
    if (initialFilter.nextActionDate) { setFNextAction("today"); }
    if (initialFilter.hasPortal)      { setFHasPortal(true); }
    onFilterConsumed && onFilterConsumed();
  }, [initialFilter]);

  useEffect(() => {
    if (!initialOpenId) return;
    setOpenId(initialOpenId);
    onOpenIdConsumed && onOpenIdConsumed();
  }, [initialOpenId]);

  const STATUS_ORDER_FIXED = Object.fromEntries(getStatuses().map((s,i) => [s, i]));

  const list = leads
    .filter(l => fStatuses.size === 0 || fStatuses.has(l.status))
    .filter(l => { if (!fMonth) return true; const s=l.date||""; let ym=s.slice(0,7); if(!/^\d{4}-\d{2}$/.test(ym)){const m=s.match(/^(\d{4})[\/-](\d{1,2})/);ym=m?m[1]+"-"+m[2].padStart(2,"0"):"";} return ym===fMonth; })
    .filter(l => !fNextAction || (fNextAction==="today" ? l.next_action_date===TODAY : l.next_action_date&&l.next_action_date<TODAY))
    .filter(l => !fSource || l.source === fSource)
    .filter(l => !fHasPortal || !!l.portal_site)
    .filter(l => !fPortal || l.portal_site === fPortal)
    .filter(l => !fIS || l.is_member === fIS)
    .filter(l => !fQ || [l.company, l.contact].join(" ").includes(fQ))
    .sort((a,b) => {
      const normDate = s => { if (!s) return ""; const m=s.match(/(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/); return m?`${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`:s; };
      if (sort === "date") {
        const da = normDate(a.date), db = normDate(b.date);
        return sortDir === "asc" ? (da > db ? 1 : -1) : (da < db ? 1 : -1);
      }
      if (sort === "nextAction") {
        const da = a.next_action_date||"9999", db = b.next_action_date||"9999";
        return sortDir === "asc" ? (da > db ? 1 : -1) : (da < db ? 1 : -1);
      }
      // 標準: 新規登録（本日登録かつアクション未登録）は最上部に表示（1日間有効）
      const toDay = ts => ts ? new Date(ts).toISOString().split("T")[0] : null;
      const aIsNew = toDay(a.created_at) === TODAY && (!a.actions || a.actions.length === 0);
      const bIsNew = toDay(b.created_at) === TODAY && (!b.actions || b.actions.length === 0);
      if (aIsNew && !bIsNew) return -1;
      if (!aIsNew && bIsNew) return 1;
      // 追客日 > ステータス > 反響日
      const da = a.next_action_date||"", db = b.next_action_date||"";
      if (da && !db) return -1;
      if (!da && db) return 1;
      if (da !== db) return da < db ? -1 : 1;
      const sa = STATUS_ORDER_FIXED[a.status]??99, sb = STATUS_ORDER_FIXED[b.status]??99;
      if (sa !== sb) return sa - sb;
      const ra = normDate(a.date)||"9999", rb = normDate(b.date)||"9999";
      return ra < rb ? -1 : ra > rb ? 1 : 0;
    });

  const selectedLead = openId ? leads.find(l => l.id === openId) : null;

  return (
    <div className="lead-list-container" style={{paddingLeft:28, paddingRight:28, height: isMobile ? "auto" : "100%", overflow: isMobile ? "visible" : "hidden", display:"flex", flexDirection:"column", minHeight: isMobile ? "calc(100vh - 130px)" : undefined}}>
      <div className="page-pad" style={{flexShrink:0, background:"#f0f5f2", paddingTop:24, paddingBottom:8, marginLeft:-28, marginRight:-28, paddingLeft:28, paddingRight:28, borderBottom:"1px solid #d8ede1"}}>
      <Header title="リード一覧" sub={`${leads.length}件 / 表示 ${list.length}件`}>
        <div className="lead-header-actions" style={{display:"flex", gap:8}}>
          <button onClick={() => {
            const headers = ["会社名","担当者名","反響日","流入元","ポータルサイト名","ポータル種別","課金対象外申請済","ステータス","IS担当","MQL判定","商談日","商談時刻","担当営業","Zoho CRM URL","HP URL","IS確度","ネクストアクション日","ネクストアクション時刻","ネクストアクションメモ"];
            const rows = leads.map(l=>[l.company,l.contact,l.date,l.source,l.portal_site||"",l.portal_type||"",l.charge_applied?"TRUE":"FALSE",l.status,l.is_member||"",l.mql||"非MQL",l.meeting_date||"",l.meeting_time||"",l.sales_member||"",l.zoho_url||"",l.hp_url||"",l.is_accuracy||"",l.next_action_date||"",l.next_action_time||"",l.next_action||""].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(","));
            const csv = "﻿" + headers.join(",") + "\n" + rows.join("\n");
            const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a"); a.href=url; a.download="dandori_leads_"+TODAY+".csv"; a.click();
            URL.revokeObjectURL(url);
          }} style={S.btnSec}>📤 CSVエクスポート</button>
          {!readOnly && <button onClick={() => { setShowImport(v=>!v); setImportResult(null); }} style={S.btnSec}>
            📥 CSVインポート
          </button>}
          {!readOnly && <button onClick={() => { setEditing(null); setShowForm(true); }} style={{...S.btnP, background:"linear-gradient(135deg,#f97316,#ea580c)"}}>＋ 新規追加</button>}
        </div>
      </Header>

      {/* Filters */}
      {/* 1行目：検索・流入元・月・IS担当 */}
      <div className="filter-bar" style={{display:"flex", gap:8, marginBottom:6, alignItems:"center"}}>
        <input value={fQ} onChange={e => setFQ(e.target.value)}
          placeholder="🔍 会社名・担当者" style={{...S.sel, width:220, flexShrink:0}} />
        <select value={fSource} onChange={e => { setFSrc(e.target.value); setFPortal(""); }} style={{...S.sel, flexShrink:0}}>
          <option value="">全流入元</option>
          {getSources().map(s => <option key={s}>{s}</option>)}
        </select>
        {fHasPortal && (
          <button onClick={()=>setFHasPortal(false)} style={{fontSize:11,padding:"3px 9px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",flexShrink:0, background:"#8b5cf633", color:"#7c3aed", border:"1px solid #8b5cf666", fontWeight:700}}>🏢 ポータル ✕</button>
        )}
        {sourceHasPortal(fSource) && (
          <select value={fPortal} onChange={e => setFPortal(e.target.value)} style={{...S.sel, flexShrink:0}}>
            <option value="">全サイト</option>
            {getPortalSitesForSource(fSource).map(p => <option key={p}>{p}</option>)}
          </select>
        )}
        <select value={fMonth} onChange={e => setFMonth(e.target.value)} style={{...S.sel, flexShrink:0}}>
          <option value="">全期間</option>
          {[...new Set(leads.map(l=>{ const s=l.date||""; if(/^\d{4}-\d{2}/.test(s))return s.slice(0,7); const m=s.match(/^(\d{4})[\/-](\d{1,2})/); return m?m[1]+"-"+m[2].padStart(2,"0"):""; }).filter(Boolean))].sort().reverse().map(m=><option key={m} value={m}>{m.slice(0,4)}年{parseInt(m.slice(5))}月</option>)}
        </select>
        <select value={fIS} onChange={e => setFIS(e.target.value)} style={{...S.sel, flexShrink:0}}>
          <option value="">全IS担当</option>
          {getISMembers().map(m => <option key={m}>{m}</option>)}
        </select>
      </div>
      {/* 2行目：並び順＋ステータス絞り込み */}
      <div className="filter-bar" style={{display:"flex", gap:4, alignItems:"center", marginBottom:16, flexWrap: isMobile ? "wrap" : "nowrap"}}>
        <span style={{fontSize:11,color:"#6a9a7a",flexShrink:0}}>並び順:</span>
        {[["fixed","標準"],["date","反響日"],["nextAction","追客日"]].map(([v,label]) => (
          <button key={v} onClick={() => {
            if (sort === v) { setSortDir(d => d === "asc" ? "desc" : "asc"); }
            else { setSort(v); setSortDir("asc"); }
          }} style={{fontSize:11,padding:"4px 10px",borderRadius:8,cursor:"pointer",fontFamily:"inherit", background: sort===v ? "#10b98122" : "transparent", color: sort===v ? "#059669" : "#3d7a5e", border: `1px solid ${sort===v ? "#10b98155" : "#c0dece"}`, fontWeight: sort===v ? 700 : 400}}>
            {label}{sort===v && v!=="fixed" ? (sortDir==="asc" ? " ↑" : " ↓") : ""}
          </button>
        ))}
        <span style={{fontSize:11,color:"#c0dece",flexShrink:0, margin:"0 4px"}}>|</span>
        <button onClick={()=>setFNextAction(v=>v==="today"?"":"today")} style={{fontSize:11,padding:"3px 9px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",flexShrink:0, background:fNextAction==="today"?"#ea580c33":"transparent", color:fNextAction==="today"?"#ea580c":"#3d7a5e", border:`1px solid ${fNextAction==="today"?"#ea580c66":"#c0dece"}`, fontWeight:fNextAction==="today"?700:400}}>🔥 本日追客</button>
        <span style={{fontSize:11,color:"#c0dece",flexShrink:0, margin:"0 4px"}}>|</span>
        <span style={{fontSize:11,color:"#6a9a7a",flexShrink:0}}>ステータス:</span>
        {getStatuses().map(s => {
          const active = fStatuses.has(s);
          const c = getStatusColor(s);
          return (
            <button key={s} onClick={() => setFStatuses(prev => {
              const n = new Set(prev); active ? n.delete(s) : n.add(s); return n;
            })} style={{fontSize:11,padding:"3px 9px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",flexShrink:0, background: active ? c+"33" : "transparent", color: active ? c : "#3d7a5e", border: `1px solid ${active ? c+"66" : "#c0dece"}`, fontWeight: active ? 700 : 400}}>
              {s}
            </button>
          );
        })}
        {fStatuses.size > 0 && <button onClick={() => setFStatuses(new Set())}
          style={{fontSize:11,color:"#6a9a7a",background:"none",border:"none",cursor:"pointer",padding:"2px 4px",flexShrink:0,whiteSpace:"nowrap"}}>✕ クリア</button>}
      </div>
      </div>{/* /sticky */}

      {showImport && (
        <CSVImport
          onImport={(newLeads) => {
            onBulkAdd(newLeads);
            setImportResult({ count: newLeads.length });
          }}
          onClose={() => setShowImport(false)}
          result={importResult}
        />
      )}

      <div style={{display:"flex", gap:12, marginTop:16, flex:1, minHeight:0, overflow: isMobile ? "visible" : "hidden"}}>
        {/* 左側：リード一覧 */}
        <div style={{flex: isMobile ? "none" : "0 0 50%", width: isMobile ? "100%" : "50%", overflowY:"auto"}}>
          <div style={{display:"flex", flexDirection:"column", gap:10}}>
            {list.length === 0 && <div style={{...S.empty,padding:"32px"}}>リードがありません</div>}
            {list.map(lead => (
              <LeadRow key={lead.id} lead={lead} openId={openId} setOpenId={setOpenId}
                onEdit={readOnly ? null : () => { setEditing(lead); setShowForm(true); }}
                onDelete={readOnly ? null : () => onDelete(lead.id)}
                readOnly={readOnly}
                currentUser={currentUser}
                onStatusChange={s => {
                  const patch = { status: s };
                  if (lead.status === "商談確定" && s !== "商談確定") {
                    patch.meeting_date = "";
                    patch.meeting_time = "";
                    patch.sales_member = "";
                  }
                  onUpdate(lead.id, patch);
                  // Zoho連携済みリードはステータス変更をZohoにも反映（fire-and-forget）
                  if (lead.zoho_lead_id && window.__appData?.zohoAuthenticated) {
                    fetch('/api/zoho/update-lead-status', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json', 'x-session-token': getToken() },
                      body: JSON.stringify({ zohoLeadId: lead.zoho_lead_id, localStatus: s }),
                    }).catch(() => {});
                  }
                }}
                onUpdate={p => onUpdate(lead.id, p)}
              />
            ))}
          </div>
        </div>

        {/* デスクトップ: 右パネル（アクション履歴） */}
        {!isMobile && selectedLead && (
          <div style={{flex:1, minWidth:0, background:"#fff", border:"1px solid #e2f0e8", borderRadius:12, boxShadow:"0 2px 12px #0569690a", overflow:"hidden", height:"100%", overflowY:"auto"}}>
            <ActionHistoryPanel
              key={selectedLead.id}
              lead={selectedLead}
              onClose={() => setOpenId(null)}
              onUpdate={p => onUpdate(selectedLead.id, p)}
              onEdit={readOnly ? null : () => { setEditing(selectedLead); setShowForm(true); }}
              onDelete={readOnly ? null : () => { onDelete(selectedLead.id); setOpenId(null); }}
              currentUser={currentUser}
              readOnly={readOnly}
              onEditAction={(aid, updated) => {
                const newActions = (selectedLead.actions||[]).map(a => a.id === aid ? { ...a, ...updated } : a);
                const patch = { actions: newActions };
                if (updated.nextDate) { patch.next_action_date = updated.nextDate; patch.next_action_time = updated.nextTime||""; patch.next_action = updated.next||""; }
                onUpdate(selectedLead.id, patch);
              }}
              onDeleteAction={aid => {
                const remaining = (selectedLead.actions||[]).filter(a => a.id !== aid);
                const patch = { actions: remaining };
                if (remaining.length === 0) { patch.next_action = ""; patch.next_action_date = ""; patch.next_action_time = ""; }
                else { const latest = remaining.find(a => a.nextDate); if (!latest) { patch.next_action = ""; patch.next_action_date = ""; patch.next_action_time = ""; } }
                onUpdate(selectedLead.id, patch);
              }}
            />
          </div>
        )}
      </div>

      {/* モバイル: アクション履歴をオーバーレイで表示 */}
      {isMobile && selectedLead && (
        <div style={{position:"fixed", inset:0, zIndex:500, background:"#000000bb", display:"flex", flexDirection:"column", justifyContent:"flex-end"}} onClick={() => setOpenId(null)}>
          <div style={{background:"#fff", borderRadius:"16px 16px 0 0", maxHeight:"85vh", display:"flex", flexDirection:"column", overflowY:"auto", paddingBottom:65}} onClick={e => e.stopPropagation()}>
            <ActionHistoryPanel
              key={selectedLead.id}
              lead={selectedLead}
              onClose={() => setOpenId(null)}
              onUpdate={p => onUpdate(selectedLead.id, p)}
              onEdit={readOnly ? null : () => { setEditing(selectedLead); setShowForm(true); }}
              onDelete={readOnly ? null : () => { onDelete(selectedLead.id); setOpenId(null); }}
              currentUser={currentUser}
              readOnly={readOnly}
              onEditAction={(aid, updated) => {
                const newActions = (selectedLead.actions||[]).map(a => a.id === aid ? { ...a, ...updated } : a);
                const patch = { actions: newActions };
                if (updated.nextDate) { patch.next_action_date = updated.nextDate; patch.next_action_time = updated.nextTime||""; patch.next_action = updated.next||""; }
                onUpdate(selectedLead.id, patch);
              }}
              onDeleteAction={aid => {
                const remaining = (selectedLead.actions||[]).filter(a => a.id !== aid);
                const patch = { actions: remaining };
                if (remaining.length === 0) { patch.next_action = ""; patch.next_action_date = ""; patch.next_action_time = ""; }
                else { const latest = remaining.find(a => a.nextDate); if (!latest) { patch.next_action = ""; patch.next_action_date = ""; patch.next_action_time = ""; } }
                onUpdate(selectedLead.id, patch);
              }}
            />
          </div>
        </div>
      )}

      {showForm && (
        <LeadForm initial={editing}
          onSave={d => {
            editing ? onUpdate(editing.id, d) : onAdd({ id: uid(), date: TODAY, actions: [], created_at: Date.now(), ...d });
            setShowForm(false);
          }}
          onClose={() => setShowForm(false)} />
      )}
    </div>
  );
}

function NextActionEditBtn({ nad, lead, onUpdate, currentUser }) {
  const [editNA, setEditNA] = useState(false);
  const [naDate, setNADate] = useState(nad||"");
  const [naTime, setNATime] = useState(lead.next_action_time||"");
  const [naMemo, setNAMemo] = useState(lead.next_action||"");
  const [calToken, setCalToken] = useState(null);
  const [calSaving, setCalSaving] = useState(false);
  const [calSaved, setCalSaved] = useState(false);

  const createCalTodo = async (date, time) => {
    const clientId = getEffectiveAiConfig(currentUser).gmailClientId;
    if (!clientId) { alert(currentUser?.role === "admin" ? "設定 > APIキー設定 で Gmail Client ID を入力してください" : "管理者にGmail OAuth Client IDの設定を依頼してください"); return; }
    if (!date) { alert("ネクストアクション日が設定されていません"); return; }
    setCalSaving(true);
    try {
      // 有効期限内のトークンがあれば再利用、期限切れなら再取得する
      let tokenObj = calToken;
      if (!isTokenValid(tokenObj)) {
        if (!window.google?.accounts?.oauth2) {
          await new Promise((res, rej) => {
            if (document.querySelector('script[src*="accounts.google.com/gsi/client"]')) { res(); return; }
            const s = document.createElement('script');
            s.src = 'https://accounts.google.com/gsi/client';
            s.onload = res; s.onerror = rej;
            document.head.appendChild(s);
          });
          await new Promise(r => setTimeout(r, 500));
        }
        const rawToken = await new Promise((res, rej) => {
          const client = window.google.accounts.oauth2.initTokenClient({
            client_id: clientId,
            scope: 'https://www.googleapis.com/auth/tasks',
            callback: (resp) => {
              if (resp.error) {
                if (resp.error === 'redirect_uri_mismatch' || resp.error === 'invalid_client') {
                  rej(new Error(`OAuth設定エラー: Google Cloud ConsoleのOAuthクライアントの「承認済みJavaScriptオリジン」に "${window.location.origin}" を追加してください。`));
                } else { rej(new Error(resp.error)); }
              } else { res(resp.access_token); }
            },
            error_callback: (err) => {
              if (err.type === 'popup_blocked_by_browser') {
                rej(new Error('ポップアップがブロックされました。ブラウザのポップアップブロックを解除してください。'));
              } else {
                rej(new Error(`OAuth設定エラー: Google Cloud ConsoleのOAuthクライアントの「承認済みJavaScriptオリジン」に "${window.location.origin}" が登録されているか確認してください。`));
              }
            }
          });
          client.requestAccessToken();
        });
        tokenObj = { token: rawToken, expiresAt: Date.now() + 55 * 60 * 1000 };
        setCalToken(tokenObj);
      }
      const token = tokenObj.token;
      const task = {
        title: lead.company || "(会社名未設定)",
        notes: lead.zoho_url || "",
        due: `${date}T00:00:00.000Z`
      };
      const calRes = await fetch("https://tasks.googleapis.com/tasks/v1/lists/@default/tasks", {
        method: "POST",
        headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify(task)
      });
      if (!calRes.ok) {
        const err = await calRes.json();
        if ((err.error?.code===401)||(err.error?.status==='UNAUTHENTICATED')) { setCalToken(null); throw new Error('認証の期限が切れました。再度お試しください。'); }
        throw new Error(err.error?.message || 'タスク作成に失敗しました');
      }
      setCalSaved(true);
      setTimeout(() => setCalSaved(false), 3000);
    } catch(e) {
      alert('GoogleタスクTODO作成エラー: ' + e.message);
    } finally {
      setCalSaving(false);
    }
  };

  if (editNA) return (
    <div style={{display:"flex", gap:6, alignItems:"center",flexWrap:"wrap", marginLeft:4}}>
      <input type="date" value={naDate} onChange={e=>setNADate(e.target.value)}
        style={{...S.inp,padding:"3px 6px",fontSize:11, width:130}} />
      <select value={naTime} onChange={e=>setNATime(e.target.value)}
        style={{...S.inp,padding:"3px 6px",fontSize:11, width:80}}>
        <option value="">時刻なし</option>
        {Array.from({length:28},(_,i)=>{const h=String(Math.floor(i/2)+8).padStart(2,"0");const m=i%2===0?"00":"30";return <option key={i} value={`${h}:${m}`}>{h}:{m}</option>;})}
      </select>
      <input value={naMemo} onChange={e=>setNAMemo(e.target.value)} placeholder="メモ"
        style={{...S.inp,padding:"3px 6px",fontSize:11, width:120}} />
      <button onClick={()=>{ onUpdate({next_action_date:naDate,next_action_time:naTime,next_action:naMemo}); setEditNA(false); }}
        style={{...S.btnDelXs,background:"#059669"}}>保存</button>
      <button onClick={()=>setEditNA(false)} style={S.btnCancelXs}>✕</button>
    </div>
  );
  return (
    <div style={{display:"flex", gap:4, marginLeft:4}}>

        <button onClick={()=>createCalTodo(nad, lead.next_action_time)} disabled={calSaving}
          style={{...S.btnIconSm,fontSize:11,opacity:calSaving?0.5:1,color:calSaved?"#7c3aed":"inherit"}}
          title="GoogleカレンダーにTODO作成">{calSaved?"✅":"☑️"}</button>
      )}
      <button onClick={()=>onUpdate({next_action:"",next_action_date:"",next_action_time:""})}
        style={{...S.btnIconSm,background:"#fef2f2",border:"1px solid #fca5a5"}} title="削除"><TrashIcon size={11} color="#ef4444"/></button>

function LeadRow({ lead, onEdit, onDelete, onStatusChange, onUpdate, openId, setOpenId, readOnly, currentUser }) {
  const open = openId === lead.id;
  const [confirmDelete, setConfirmDelete] = useState(false);
  const pc = "#10b981"; // 優先度廃止のためエメラルド固定
  const actions = lead.actions || [];
  const last = actions[0];

  const srcIconKey2 = getSourceIcon(lead.source) || "document";
  const sc = getStatusColor(lead.status);
  const nad = lead.next_action_date;
  const subParts = [
    lead.contact,
    lead.date ? `反響日：${lead.date}` : null,
    last ? `最終：${last.date}${last.time ? " "+last.time : ""}` : null,
  ].filter(Boolean);

  return (
    <div style={{...S.leadCard, border: open ? "1px solid #10b98155" : "1px solid #e2f0e8", boxShadow: open ? "0 4px 16px #10b98115" : "0 1px 6px #0569690a", transition:"box-shadow 0.15s, border-color 0.15s",}}
      onMouseEnter={e=>{ if(!open){ e.currentTarget.style.boxShadow="0 3px 12px #0569691a"; e.currentTarget.style.borderColor="#c0dece"; }}}
      onMouseLeave={e=>{ if(!open){ e.currentTarget.style.boxShadow="0 1px 6px #0569690a"; e.currentTarget.style.borderColor="#e2f0e8"; }}}>

      {/* ─ 1行メインロー ─ */}
      <div style={{display:"flex",alignItems:"center", gap:12,padding:"13px 16px", background: open ? "#f0faf5" : "transparent",cursor:"pointer", userSelect:"none"}}
        onClick={()=>setOpenId(id => id === lead.id ? null : lead.id)}>

        {/* アイコン */}
        <div style={{width:36, height:36,borderRadius:9, flexShrink:0, background: open ? sc+"22" : "#f0f5f2", border:`1.5px solid ${sc}33`, display:"flex",alignItems:"center", justifyContent:"center",fontSize:17}}>
          <SourceIconSVG iconKey={srcIconKey2} size={26}/>
        </div>

        {/* 会社名＋サブテキスト */}
        <div style={{flex:1, minWidth:0}}>
          <div style={{fontSize:14,fontWeight:700,color:"#174f35", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>
            {lead.company || "（会社名未設定）"}
          </div>
          {subParts.length > 0 && (
            <div style={{fontSize:11,color:"#6a9a7a", marginTop:2, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>
              {subParts.join(" · ")}
            </div>
          )}
        </div>

        {/* 右側：ステータス＋優先度＋操作（クリック伝播止め） */}
        <div style={{display:"flex",alignItems:"center", gap:6,flexShrink:0}}
          onClick={e=>e.stopPropagation()}>

          {/* IS担当バッジ */}
          {lead.is_member && (() => {
            const c = IS_COLORS[lead.is_member] || { bg:"#3d7a5e",border:"#47556966" };
            return <span style={{fontSize:11,fontWeight:700,color:c.bg, background:c.bg+"12",border:`1px solid ${c.bg}33`, borderRadius:6,padding:"2px 8px", whiteSpace:"nowrap"}}>{lead.is_member}</span>;
          })()}

          {/* MQL バッジ */}
          {(lead.mql||"").trim() === "MQL" && (
            <span style={{fontSize:11,fontWeight:700,color:"#6b7280", background:"#f3f4f6",border:"1px solid #d1d5db", borderRadius:6,padding:"2px 8px", whiteSpace:"nowrap"}}>MQL</span>
          )}

          {/* 課金対象外バッジ */}
          {lead.portal_site && lead.charge_applied && (
            <span style={{fontSize:11,fontWeight:700,color:"#6a9a7a", background:"#f0f5f2",border:"1px solid #c0dece", borderRadius:6,padding:"2px 7px", whiteSpace:"nowrap"}}>課金対象外</span>
          )}

          {/* ステータス select / badge */}
          {readOnly
            ? <span style={{fontSize:11,fontWeight:700,color:sc, background:sc+"15",border:`1px solid ${sc}44`, borderRadius:8,padding:"3px 8px", whiteSpace:"nowrap"}}>{lead.status||"新規"}</span>
            : <select value={lead.status||"新規"}
                onChange={e=>{ e.stopPropagation(); onStatusChange(e.target.value); }}
                style={{fontSize:11,fontWeight:700,color:sc, background:sc+"15",border:`1px solid ${sc}44`, borderRadius:8,padding:"3px 8px",cursor:"pointer", fontFamily:"inherit", outline:"none", whiteSpace:"nowrap"}}>
                {getStatuses().map(s=><option key={s}>{s}</option>)}
              </select>
          }

          {/* 編集・削除ボタン（IS担当のみ） */}
          {!readOnly && <div style={{display:"flex", gap:3, alignItems:"center", marginLeft:4}}>
            <button onClick={e=>{e.stopPropagation();onEdit();}}
              style={{width:26, height:26,borderRadius:6,border:"1px solid #86efac", background:"#f0fdf4",cursor:"pointer", display:"flex",alignItems:"center", justifyContent:"center"}}
              title="編集"><PencilIcon color="#059669"/></button>
            {confirmDelete ? (
              <div style={{display:"flex", gap:3, alignItems:"center"}} onClick={e=>e.stopPropagation()}>
                <span style={{fontSize:10,color:"#ef4444"}}>削除?</span>
                <button onClick={e=>{e.stopPropagation();onDelete();}} style={S.btnDelXs}>削除</button>
                <button onClick={e=>{e.stopPropagation();setConfirmDelete(false);}} style={S.btnCancelXs}>✕</button>
              </div>
            ) : (
              <button onClick={e=>{e.stopPropagation();setConfirmDelete(true);}}
                style={{width:26, height:26,borderRadius:6,border:"1px solid #fca5a5", background:"#fef2f2",cursor:"pointer",color:"#ef4444", display:"flex",alignItems:"center", justifyContent:"center"}}
                title="削除"><TrashIcon color="#ef4444"/></button>
            )}
          </div>}
        </div>
      </div>

      {/* Always-visible: next action + Zoho link */}
      {(lead.next_action || lead.next_action_date || lead.zoho_url || lead.hp_url) && (() => {
        const nad = lead.next_action_date;
        const overdue  = isOverdue(nad);
        const today    = isDueToday(nad);
        const soon     = isDueSoon(nad);
        const dateColor = overdue ? "#dc2626" : today ? "#ea580c" : "#059669";
        return (
          <div style={{...S.leadQuick,background:"transparent", borderTop:"1px solid #e8f5ee",padding:"5px 14px"}} onClick={e=>e.stopPropagation()}>
            {lead.zoho_url && (
              <a href={lead.zoho_url} target="_blank" rel="noopener noreferrer"
                style={{...S.zohoLinkSmall, fontSize:11, padding:"3px 9px", flexShrink:0}} onClick={e=>e.stopPropagation()}>
                🔗 Zoho
              </a>
            )}
            {lead.hp_url && (
              <a href={lead.hp_url} target="_blank" rel="noopener noreferrer"
                style={{...S.zohoLinkSmall, fontSize:11, padding:"3px 9px", flexShrink:0, background:"#e0f2fe", borderColor:"#7dd3fc", color:"#0369a1"}} onClick={e=>e.stopPropagation()}>
                🌐 HP
              </a>
            )}
            {(nad || lead.next_action) && (
              <div style={{...S.nextActInline, flex:1}}>
                {overdue && <span style={{fontSize:11,background:"#ef4444",color:"#fff",borderRadius:4,padding:"1px 6px", marginRight:6,fontWeight:700}}>期限切れ</span>}
                {today   && <span style={{fontSize:11,background:"#f97316",color:"#fff",borderRadius:4,padding:"1px 6px", marginRight:6,fontWeight:700}}>本日</span>}
                {soon && !today && !overdue && <span style={{fontSize:11,background:"#f97316",color:"#fff",borderRadius:4,padding:"1px 6px", marginRight:6,fontWeight:700}}>まもなく</span>}
                <span style={{color:dateColor, marginRight:4}}>→</span>
                {nad && <span style={{fontWeight:700, marginRight:4,color:dateColor}}>{nad}{lead.next_action_time ? " "+lead.next_action_time : ""}</span>}
                {lead.next_action && <span style={{color:"#174f35",fontSize:12}}>{lead.next_action}</span>}
              </div>
            )}
            {(nad || lead.next_action) && <NextActionEditBtn nad={nad} lead={lead} onUpdate={onUpdate} currentUser={currentUser} />}

          </div>
        );
      })()}

      {/* Always-visible: メモ */}
      {lead.memo && (
        <div style={{display:"flex",alignItems:"flex-start",gap:6,padding:"5px 14px",borderTop:"1px solid #bae6fd",background:"#e0f2fe"}} onClick={e=>e.stopPropagation()}>
          <span style={{fontSize:12,color:"#0369a1",flexShrink:0,marginTop:1}}>📝</span>
          <span style={{fontSize:12,color:"#1e3a5f",lineHeight:1.5,wordBreak:"break-word"}}>{lead.memo}</span>
        </div>
      )}

      {/* Always-visible: 商談情報 */}
      {(lead.meeting_date || lead.sales_member || lead.is_accuracy) && (
        <div style={{...S.meetingBar,padding:"5px 16px", borderTop:"1px solid #e8f5ee"}} onClick={e=>e.stopPropagation()}>
          <span style={{fontSize:11,color:"#10b981",fontWeight:700,flexShrink:0}}>🤝 商談</span>
          {lead.meeting_date && (
            <span style={{fontSize:11,color:"#6b7280"}}>
              {lead.meeting_date}{lead.meeting_time ? " " + lead.meeting_time : ""}
            </span>
          )}
          {lead.sales_member && (
            <span style={{fontSize:11,color:"#6b7280",fontWeight:600}}>担当：{lead.sales_member}</span>
          )}
          {lead.is_accuracy && (
            <span style={{fontSize:10,fontWeight:700,color:"#6b7280",background:"#f3f4f6",border:"1px solid #d1d5db",borderRadius:6,padding:"2px 8px",whiteSpace:"nowrap"}}>IS確度：{lead.is_accuracy}</span>
          )}
        </div>
      )}

    </div>
  );
}

  const isEdit = !!initial;
  const timeOptions = Array.from({length:48},(_,i)=>{const h=String(Math.floor(i/2)).padStart(2,"0");const m=i%2===0?"00":"30";return `${h}:${m}`;});

        </div>
        <div>
          <label style={S.lbl}>結果</label>

          </select>

          <label style={S.lbl}>時刻</label>
          <select value={time} onChange={e=>setTime(e.target.value)} style={S.inp}>

            {timeOptions.map(t=><option key={t} value={t}>{t}</option>)}

      </div>

          <label style={S.lbl}>次回追客日</label>
          <input type="date" value={nextDate} onChange={e=>setNextDate(e.target.value)}
            style={{...S.inp, borderColor: nextDate && !isBusinessDay(nextDate) ? "#ef4444" : "#c0dece"}} />
          {nextDate && !isBusinessDay(nextDate) && (
            <div style={{fontSize:11,color:"#ef4444", marginTop:3}}>⚠️ 土日祝です</div>
          )}
        </div>
        <div>
          <label style={S.lbl}>次回時刻</label>
          <select value={nextTime} onChange={e=>setNextTime(e.target.value)} style={S.inp}>
            <option value="">指定なし</option>
            {Array.from({length:28},(_,i)=>{
              const h=String(Math.floor(i/2)+8).padStart(2,"0");
              const m=i%2===0?"00":"30";
              return <option key={i} value={`${h}:${m}`}>{`${h}:${m}`}</option>;
            })}
          </select>
        </div>
        <div>
          <label style={S.lbl}>メモ（任意）</label>
          <input value={nextLabel} onChange={e=>setNextLabel(e.target.value)}

        <button onClick={onClose} style={S.btnSec}>キャンセル</button>
        <button onClick={() => { if (!summary.trim() && !nextDate) return alert("メモまたは次回追客日を入力してください");
          onSave({ id: initial?.id || uid(), type, result, summary, date, time, next: nextLabel, nextDate, nextTime, ts: initial?.ts || Date.now() }); }}
          style={S.btnP}>{isEdit ? "更新する" : "記録する"}</button>
      </div>
    </div>
  );
}

function ActionHistoryPanel({ lead, onClose, onUpdate, onEditAction, onDeleteAction, onEdit, onDelete, currentUser, readOnly }) {

  const [zohoMsg, setZohoMsg] = useState('');

  const actions = lead.actions || [];

  const zohoAuthenticated = window.__appData?.zohoAuthenticated || false;

  // 商談確定時: Zohoに取引先・取引先責任者・商談を作成
  const createZohoDeal = async () => {
    if (!zohoAuthenticated) { alert('Zoho認証が必要です。設定 → Zoho CRM連携 から認証してください。'); return; }
    if (!window.confirm(`「${lead.company}」の取引先・取引先責任者・商談をZohoに作成しますか？`)) return;
    setZohoCreating(true); setZohoMsg('');
    try {
      const res = await fetch('/api/zoho/create-deal', {
        method:'POST', headers:{'Content-Type':'application/json','x-session-token':getToken()},
        body: JSON.stringify({ lead }),
      });
      const data = await res.json();
      if (res.ok && data.ok) {
        // 作成されたIDをリードに保存
        onUpdate({ zoho_account_id: data.accountId, zoho_contact_id: data.contactId, zoho_deal_id: data.dealId });
        if (data.warn === 'kv_save_failed') {
          setZohoMsg('✅ Zohoへの作成は完了しました。ページを再読み込みして「Zoho商談済」になっているか確認してください。');
        } else {
          setZohoMsg('✅ Zohoに取引先・取引先責任者・商談を作成しました');
        }
      } else if (res.status === 409) {

              <button onClick={createZohoDeal} disabled={zohoCreating}
                style={{background: zohoCreating?"#9ca3af":"linear-gradient(135deg,#0ea5e9,#0284c7)", border:"none", borderRadius:6, cursor: zohoCreating?"default":"pointer", color:"#fff", fontSize:11, padding:"3px 9px", fontWeight:700, lineHeight:1.4}}>
                {zohoCreating ? "作成中..." : "🔗 Zoho商談作成"}
              </button>
            )}
            {!readOnly && lead.status === "商談確定" && lead.zoho_deal_id && (
              <span style={{fontSize:11,color:"#0ea5e9",fontWeight:700,padding:"3px 8px",background:"#e0f2fe",border:"1px solid #7dd3fc",borderRadius:6}}>✅ Zoho商談済</span>
            )}
            <button onClick={copyDealInfo} style={{background: dealCopied?"#10b981":"none", border:`1px solid ${dealCopied?"#10b981":"#10b98166"}`, borderRadius:6, cursor:"pointer", color: dealCopied?"#fff":"#059669", fontSize:12, padding:"2px 8px", lineHeight:1.4, fontWeight:600, transition:"all 0.2s"}}>{dealCopied ? "✅ コピー済み" : "📋 商談共有用"}</button>
            {!readOnly && <button onClick={onEdit} style={{background:"#f0fdf4", border:"1px solid #86efac", borderRadius:6, cursor:"pointer", color:"#059669", fontSize:12, padding:"3px 7px", display:"flex", alignItems:"center"}} title="編集"><PencilIcon color="#059669"/></button>}
            {!readOnly && (confirmDelete

          {lead.source && (()=>{ const sc=getSourceColor(lead.source,0); return <span style={{fontSize:11, color:sc, background:sc+"1a", border:`1px solid ${sc}33`, borderRadius:6, padding:"1px 7px", fontWeight:600}}>📥 {lead.source}{lead.portal_site?" / "+lead.portal_site:""}</span>; })()}
          {lead.meeting_date && <span style={{fontSize:11, color:"#10b981", fontWeight:600}}>🤝 {lead.meeting_date}</span>}

        </div>
        {/* ネクストアクション */}

            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", gap:4}}>

                {today   && <span style={{fontSize:10,background:"#f97316",color:"#fff",borderRadius:4,padding:"1px 5px",fontWeight:700}}>本日</span>}
                {soon && !today && !overdue && <span style={{fontSize:10,background:"#f97316",color:"#fff",borderRadius:4,padding:"1px 5px",fontWeight:700}}>まもなく</span>}
                <span style={{color: overdue?"#dc2626":today?"#ea580c":"#059669"}}>→</span>
                {nad && <span style={{fontWeight:700, color: overdue?"#dc2626":today?"#ea580c":"#059669"}}>{nad}{lead.next_action_time ? " "+lead.next_action_time : ""}</span>}
              </div>
              {!readOnly && <NextActionEditBtn nad={nad} lead={lead} onUpdate={onUpdate} currentUser={currentUser} />}
            </div>
            {lead.next_action && (
              <div style={{color:"#174f35", marginTop:3, lineHeight:1.5, wordBreak:"break-word", whiteSpace:"pre-wrap", display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical", overflow:"hidden"}}>

      </div>

      {/* Zoho操作メッセージ */}
      {zohoMsg && (
        <div style={{padding:"6px 16px", background: zohoMsg.startsWith('✅') ? "#d1fae5" : "#fef2f2", borderBottom:"1px solid #e2f0e8", fontSize:12, fontWeight:700, color: zohoMsg.startsWith('✅') ? "#059669" : "#dc2626"}}>
          {zohoMsg}
        </div>
