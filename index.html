    const {useState,useEffect,useRef,useMemo,useCallback}=React;

  "現場TECH":   [{ label:"一括請求", price:10000 }, { label:"ピンポイント請求", price:12000 }],

function loadMasterSettings() {
  try { return JSON.parse(localStorage.getItem("is_master_settings") || "null"); } catch { return null; }
}
function saveMasterSettings(s) {
  try { localStorage.setItem("is_master_settings", JSON.stringify(s)); } catch {}
}
function getMaster() {
  const s = loadMasterSettings();
  if (!s) return {
    salesMembers: DEFAULT_SALES_MEMBERS,
    portalSites: DEFAULT_PORTAL_SITES,
    portalTypes: DEFAULT_PORTAL_TYPES,
  };
  return s;
}
// 動的取得関数
function getSalesMembers() { return getMaster().salesMembers; }
function getPortalSites() { return getMaster().portalSites; }
function getPortalTypes() { return getMaster().portalTypes; }
function getPortalPrice(site, type) {
  if (!type) return 0;
  const types = getPortalTypes()[site] || [];
  const found = types.find(t => t.label === type);
  return found ? found.price : 0;
}
// IS担当者はis_staffフラグがtrueのアカウントのみ
function getISMembers() {
  try {
    const accounts = JSON.parse(localStorage.getItem("is_accounts") || "[]");
    if (accounts.length > 0) {
      const staff = accounts.filter(a => a.is_staff !== false);
      return staff.length > 0 ? staff.map(a => a.name) : DEFAULT_IS_MEMBERS;
    }
  } catch {}
  return DEFAULT_IS_MEMBERS;
}
const IS_COLORS = {};
function syncISColors() {
  try {
    const accounts = JSON.parse(localStorage.getItem("is_accounts") || "[]");
    accounts.forEach(a => {
      IS_COLORS[a.name] = { bg: a.color, text: a.color,border: a.color + "55" };
    });
  } catch {}
}
syncISColors();

const isBusinessDay = (dateStr) => {
  if (!dateStr) return true;
  const d = new Date(dateStr + "T00:00:00");
  const dow = d.getDay();
  return dow !== 0 && dow !== 6 && !JP_HOLIDAYS.has(dateStr);
};
const isOverdue = (dateStr) => {
  if (!dateStr) return false;
  return dateStr < TODAY;
};
const isDueToday = (dateStr) => dateStr === TODAY;
const isDueSoon = (dateStr) => {
  if (!dateStr || dateStr < TODAY) return false;
  const d = new Date(dateStr + "T00:00:00");
  const t = new Date(TODAY + "T00:00:00");
  return (d - t) / 86400000 <= 2;
};

const THIS_MONTH = TODAY.slice(0, 7);

  { id:"t1", name:"初回フォロー", subject:"【ダンドリワーク】資料のご確認のお願い", body:"{{担当者名}} 様\n\nお世話になっております。\nダンドリワークの{{送信者名}}でございます。\n\n先日はお電話にてご対応いただきありがとうございました。\nご案内した資料をご確認いただけましたでしょうか？\n\n何かご不明な点がございましたら、お気軽にご連絡ください。\n\nよろしくお願いいたします。" },
  { id:"t2", name:"商談日程調整", subject:"【ダンドリワーク】商談のご案内", body:"{{担当者名}} 様\n\nお世話になっております。\nダンドリワークの{{送信者名}}でございます。\n\nこの度はお時間をいただきありがとうございます。\n以下の日程にてオンライン商談をご提案させていただきます。\n\n■候補日時\n{{候補日時}}\n\nご都合はいかがでしょうか？\n何卒よろしくお願いいたします。" },
  { id:"t3", name:"ナーチャリング", subject:"【ダンドリワーク】建設業の施工管理DX事例のご紹介", body:"{{担当者名}} 様\n\nお世話になっております。\nダンドリワークの{{送信者名}}でございます。\n\n以前お話しさせていただいた件ですが、\n最近、同様の課題をお持ちのお客様で成果が出た事例がございますので\nご参考までにお送りさせていただきます。\n\n引き続きよろしくお願いいたします。" },
];
function loadTpls() { try { return JSON.parse(localStorage.getItem("email_tpls_v2")||"null") || DEFAULT_EMAIL_TEMPLATES; } catch { return DEFAULT_EMAIL_TEMPLATES; } }
function saveTpls(t) { try { localStorage.setItem("email_tpls_v2", JSON.stringify(t)); } catch {} }
function applyVars(body, vars) { return Object.entries(vars).reduce((s,[k,v])=>s.replaceAll("{{"+k+"}}",v||("{{"+k+"}}")),body); }

const AI_SYSTEM_PROMPT = `あなたはダンドリワーク（建築施工管理アプリ）のインサイドセールス専任アシスタントです。

ユーザーが電話メモ・アクション記録を入力すると、以下のJSON形式のみで出力してください。

{"action_summary":"架電内容サマリー（2〜3文）","action_type":"call または email または sms または other","action_result":"取次 または 不在 または 不通 または 折電 または 送信済 または その他","next_action_date_offset":3,"next_action_time":"10:00","next_action_memo":"次回アクションメモ","followup_talk_points":["ポイント1","ポイント2"],"email_subject":"フォローメール件名","email_body":"フォローメール本文","interest_level":"高 または 中 または 低","memo_for_zoho":"Zoho用詳細サマリー（3〜5文）"}

必ずJSONのみ返してください。`;

function EmailPage({ leads, onUpdate, currentUser, candidateSlots = [] }) {
  const DEFAULT_EMAIL_TEMPLATES = [
    { id:"t1", name:"初回フォロー", useSlots:false, subject:"【ダンドリワーク】資料のご確認のお願い", body:"{{担当者苗字}} 様\n\nお世話になっております。\nダンドリワークの{{送信者名}}でございます。\n\n先日はお電話にてご対応いただきありがとうございました。\nご案内した資料をご確認いただけましたでしょうか？\n\n何かご不明な点がございましたら、お気軽にご連絡ください。\n\nよろしくお願いいたします。" },
    { id:"t2", name:"商談日程調整", useSlots:true, subject:"【ダンドリワーク{{送信者名}}】ご説明日程候補日をお送りします", body:"{{担当者苗字}} 様\n\nお世話になっております。\nダンドリワークの{{送信者名}}でございます。\n\n下記日程のご都合は、いかがでしょうか。\n\n============================\n【日程候補】\n{{候補日時}}\n============================\n\nご都合のよろしい日程をご返信いただけますと幸いです。\nよろしくお願いいたします。" },
    { id:"t3", name:"ナーチャリング", useSlots:false, subject:"【ダンドリワーク】建設業の施工管理DX事例のご紹介", body:"{{担当者苗字}} 様\n\nお世話になっております。\nダンドリワークの{{送信者名}}でございます。\n\n以前お話しさせていただいた件で、成果が出た事例をご紹介します。" },
  ];
  const loadTpls = () => { try { return JSON.parse(localStorage.getItem("email_tpls_v2")||"null") || DEFAULT_EMAIL_TEMPLATES; } catch { return DEFAULT_EMAIL_TEMPLATES; } };
  const saveTpls = (t) => { try { localStorage.setItem("email_tpls_v2", JSON.stringify(t)); } catch {} };
  const applyVars = (body, vars) => Object.entries(vars).reduce((s,[k,v])=>s.replaceAll("{{"+k+"}}",v||("{{"+k+"}}")),body);

  const [tpls, setTpls] = React.useState(loadTpls);
  const [selTpl, setSelTpl] = React.useState(tpls[0]?.id||"");
  const [selLead, setSelLead] = React.useState("");
  const [vars, setVars] = React.useState({担当者名:"",担当者苗字:"",会社名:"",送信者名:"",候補日時:"",商談月:"",商談日:"",商談曜日:"",商談時:"",商談分:"",商談担当:"",宛先メール:""});
  const [previewSubj, setPreviewSubj] = React.useState("");
  const [previewBody, setPreviewBody] = React.useState("");
  const [editMode, setEditMode] = React.useState(false);
  const [editTpl, setEditTpl] = React.useState(null);
  const [copied, setCopied] = React.useState(false);
  const [selectedSlotIdxs, setSelectedSlotIdxs] = React.useState([]);
  const tpl = tpls.find(t=>t.id===selTpl)||tpls[0];
  const lead = leads.find(l=>l.id===selLead);

  // リード選択時に担当者名・担当者苗字・会社名・宛先メールアドレスを自動入力
  React.useEffect(()=>{
    if(lead){
      const contact=lead.contact||lead.company||"";
      const surname=contact.split(/[ \u3000]/)[0]||contact;
      setVars(v=>({...v,担当者名:contact,担当者苗字:surname,会社名:lead.company||"",宛先メール:lead.email||""}));
    }
  },[selLead]);

  // ログインユーザーの名前を送信者名に自動入力
  React.useEffect(()=>{ if(currentUser?.name) setVars(v=>({...v,送信者名:currentUser.name})); },[currentUser?.name]);

  // 商談月・商談日から商談曜日を自動計算
  React.useEffect(()=>{
    if(vars.商談月 && vars.商談日){
      const today = new Date();
      const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      let year = today.getFullYear();
      const m = parseInt(vars.商談月), d = parseInt(vars.商談日);
      let dt = new Date(year, m-1, d);
      if(dt < todayMidnight){ year++; dt = new Date(year, m-1, d); }
      setVars(v=>({...v, 商談曜日:["日","月","火","水","木","金","土"][dt.getDay()]}));
    } else {
      setVars(v=>({...v, 商談曜日:""}));
    }
  },[vars.商談月, vars.商談日]);

  // 候補日スロットのフォーマット
  const formatSlot = (slot) => {
    const d = new Date(slot.date + "T00:00:00");
    const dow = ["日","月","火","水","木","金","土"][d.getDay()];
    const [y,m,day] = slot.date.split("-");
    return `${parseInt(y)}年${parseInt(m)}月${parseInt(day)}日（${dow}）${slot.start}〜${slot.end}`;
  };

  // スロット選択切り替え（最大3つ）
  const toggleSlot = (idx) => {
    setSelectedSlotIdxs(prev => {
      if (prev.includes(idx)) {
        const next = prev.filter(i=>i!==idx);
        setVars(v=>({...v,候補日時:next.map(i=>formatSlot(candidateSlots[i])).join("\n")}));
        return next;
      } else if (prev.length < 3) {
        const next = [...prev, idx];
        setVars(v=>({...v,候補日時:next.map(i=>formatSlot(candidateSlots[i])).join("\n")}));
        return next;
      }
      return prev;
    });
  };

  // 候補日ツールのスロットが変わったら最大3つ自動選択
  React.useEffect(()=>{
    const idxs = candidateSlots.slice(0,3).map((_,i)=>i);
    setSelectedSlotIdxs(idxs);
    setVars(v=>({...v,候補日時:idxs.map(i=>formatSlot(candidateSlots[i])).join("\n")}));
  },[candidateSlots]);

  const body=tpl?applyVars(tpl.body,vars):"", subj=tpl?applyVars(tpl.subject,vars):"";
  const showSlots = tpl ? (tpl.useSlots !== undefined ? tpl.useSlots : tpl.body.includes("{{候補日時}}")) : false;
  const showMeeting = tpl ? (tpl.useMeeting !== undefined ? tpl.useMeeting : false) : false;
  // プレビューを変数・テンプレート変更に追従
  React.useEffect(()=>{ setPreviewSubj(subj); setPreviewBody(body); },[body,subj]);
  const [gmailToken, setGmailToken] = React.useState(null);
  const [gmailSaving, setGmailSaving] = React.useState(false);
  const [gmailSaved, setGmailSaved] = React.useState(false);

  const copy=(txt)=>{ navigator.clipboard?.writeText(txt); setCopied(true); setTimeout(()=>setCopied(false),2000); };

  const saveGmailDraft = async () => {
    const cfg = (() => { try { return JSON.parse(localStorage.getItem("ai_config")||"{}"); } catch { return {}; } })();
    const clientId = cfg.gmailClientId;
    if (!clientId) { alert("設定 > APIキー設定 で Gmail Client ID を入力してください"); return; }
    setGmailSaving(true);
    try {
      let token = gmailToken;
      if (!token) {
        if (!window.google?.accounts?.oauth2) {
          await new Promise((res, rej) => {
            if (document.querySelector('script[src*="accounts.google.com/gsi/client"]')) { res(); return; }
            const s = document.createElement('script');
            s.src = 'https://accounts.google.com/gsi/client';
            s.onload = res; s.onerror = rej;
            document.head.appendChild(s);
          });
          await new Promise(r => setTimeout(r, 500));
        }
        token = await new Promise((res, rej) => {
          const client = window.google.accounts.oauth2.initTokenClient({
            client_id: clientId,
            scope: 'https://www.googleapis.com/auth/gmail.compose',
            callback: (resp) => resp.error ? rej(new Error(resp.error)) : res(resp.access_token)
          });
          client.requestAccessToken();
        });
        setGmailToken(token);
      }
      const utf8B64 = (str) => { const b = new TextEncoder().encode(str); let s=''; for(let c of b) s+=String.fromCharCode(c); return btoa(s); };
      const to = vars.宛先メール||'';
      const lines = [];
      if (to) lines.push(`To: ${to}`);
      lines.push(`Subject: =?UTF-8?B?${utf8B64(previewSubj)}?=`);
      lines.push('MIME-Version: 1.0');
      lines.push('Content-Type: text/plain; charset=UTF-8');
      lines.push('Content-Transfer-Encoding: base64');
      lines.push('');
      lines.push(utf8B64(previewBody));
      const raw = btoa(lines.join('\r\n')).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
      const res = await fetch('https://www.googleapis.com/gmail/v1/users/me/drafts', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: { raw } })
      });
      if (!res.ok) {
        const err = await res.json();
        if ((err.error?.code===401)||(err.error?.status==='UNAUTHENTICATED')) { setGmailToken(null); throw new Error('認証の期限が切れました。再度お試しください。'); }
        throw new Error(err.error?.message || '保存に失敗しました');
      }
      setGmailSaved(true);
      setTimeout(() => setGmailSaved(false), 3000);
    } catch(e) {
      alert('Gmail下書き保存エラー: ' + e.message);
    } finally {
      setGmailSaving(false);
    }
  };

  const saveEdit=()=>{ const u=tpls.map(t=>t.id===editTpl.id?editTpl:t); setTpls(u); saveTpls(u); setEditMode(false); };
  const deleteTpl=(id)=>{ if(!window.confirm("削除しますか？")) return; const u=tpls.filter(t=>t.id!==id); setTpls(u); saveTpls(u); if(selTpl===id) setSelTpl(u[0]?.id||""); };
  const addTpl=()=>{ const n={id:"t"+Date.now(),name:"新テンプレート",useSlots:false,useMeeting:false,subject:"件名",body:"本文"}; const u=[...tpls,n]; setTpls(u); saveTpls(u); setSelTpl(n.id); setEditTpl(n); setEditMode(true); };
  const inpStyle = {width:"100%",padding:"7px 10px",borderRadius:7,border:"1px solid #c0dece",fontSize:12,outline:"none",boxSizing:"border-box",fontFamily:"inherit",background:"#f8fffe"};
  const lblStyle = {fontSize:11,color:"#6a9a7a",display:"block",marginBottom:3};
  return (
    <div style={{padding:"24px 28px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div style={{fontSize:17,fontWeight:900,color:"#174f35"}}>📧 メールテンプレート</div>
        <button onClick={addTpl} style={{padding:"7px 16px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#10b981,#059669)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>＋ テンプレート追加</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"240px 1fr",gap:16}}>
        <div style={{background:"#fff",borderRadius:12,border:"1px solid #e2f0e8",padding:"12px",height:"fit-content"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#6a9a7a",marginBottom:8}}>テンプレート一覧</div>
          {tpls.map(t=>(
            <div key={t.id} onClick={()=>{setSelTpl(t.id);setEditMode(false);}} style={{padding:"8px 10px",borderRadius:8,cursor:"pointer",marginBottom:4,background:selTpl===t.id?"#10b98122":"transparent",border:selTpl===t.id?"1px solid #10b98144":"1px solid transparent",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:12,fontWeight:selTpl===t.id?700:400,color:"#174f35"}}>{t.name}</span>
              <div style={{display:"flex",gap:3}}>
                <button onClick={e=>{e.stopPropagation();setSelTpl(t.id);setEditTpl({...t});setEditMode(true);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,opacity:0.5}}>✏️</button>
                <button onClick={e=>{e.stopPropagation();deleteTpl(t.id);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,opacity:0.5}}>🗑</button>
              </div>
            </div>
          ))}
        </div>
        <div>
          {editMode&&editTpl ? (
            <div style={{background:"#fff",borderRadius:12,border:"1px solid #fde68a",padding:"16px",display:"flex",flexDirection:"column",minHeight:"calc(100vh - 180px)"}}>

function AIPage({ leads, onAdd, onUpdate, goLeads, goCalendar, aiConfig }) {

  const [actionTime, setActionTime] = React.useState(()=>{ const n=new Date(); const m=Math.floor(n.getMinutes()/30)*30; return `${String(n.getHours()).padStart(2,"0")}:${String(m).padStart(2,"0")}`; });
  const [manualType, setManualType] = React.useState("call");
  const [manualResult, setManualResult] = React.useState("取次");

  const [result, setResult] = React.useState(null);
  const [error, setError] = React.useState("");
  const [saved, setSaved] = React.useState(false);
  const [activeTab, setActiveTab] = React.useState("action");
  const [editEmail, setEditEmail] = React.useState({ subject:"", body:"" });

  const [copiedZoho, setCopiedZoho] = React.useState(false);

  const addBizDays=(dateStr,days)=>{
    const JP_HOL=new Set(["2025-01-01","2025-01-13","2025-02-11","2025-02-23","2025-03-20","2025-04-29","2025-05-03","2025-05-04","2025-05-05","2025-05-06","2025-07-21","2025-08-11","2025-09-15","2025-09-23","2025-10-13","2025-11-03","2025-11-23","2026-01-01","2026-01-12","2026-02-11","2026-02-23","2026-03-20","2026-04-29","2026-05-03","2026-05-04","2026-05-05","2026-05-06","2026-07-20","2026-08-11","2026-09-21","2026-09-23","2026-10-12","2026-11-03","2026-11-23"]);
    let d=new Date(dateStr+"T00:00:00"),c=0;
    while(c<days){d.setDate(d.getDate()+1);const s=d.toISOString().split("T")[0];if(d.getDay()!==0&&d.getDay()!==6&&!JP_HOL.has(s))c++;}
    return d.toISOString().split("T")[0];
  };

  const analyze=async()=>{
    if(!memo.trim()) return;
    if(!apiKey){setError("APIキーが未設定です。設定画面（⚙️）の「APIキー設定」タブから入力してください。");return;}
    setLoading(true);setError("");setResult(null);setSaved(false);
    const ctx=lead?`\n【リード】${lead.company} / ${lead.contact} / ${lead.status}`:"";
    try{
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system_instruction:{parts:[{text:AI_SYSTEM_PROMPT}]},contents:[{role:"user",parts:[{text:ctx+"\n\n【メモ】\n"+memo}]}],generationConfig:{maxOutputTokens:2048,responseMimeType:"application/json"}})});
      const data=await res.json();
      if(data.error) throw new Error(data.error.message||data.error.status);
      const text=(data.candidates[0].content.parts||[]).map(i=>i.text||"").join("");
      const cleaned=text.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
      const jsonMatch=cleaned.match(/\{[\s\S]*\}/);
      if(!jsonMatch) throw new Error("レスポンスからJSONを抽出できませんでした");
      const parsed=JSON.parse(jsonMatch[0]);
      setResult(parsed);setEditEmail({subject:parsed.email_subject||"",body:parsed.email_body||""});setActiveTab("action");
    }catch(e){
      if(e.message==="Failed to fetch"){setError("APIへの接続に失敗しました。ネットワーク接続を確認するか、ブラウザのCORSエラーが原因の場合はローカルサーバー経由（http://localhost）でアクセスしてください。");}

    setLoading(false);
  };

    const newAct={id:Date.now().toString(36)+Math.random().toString(36).slice(2,5),type:result.action_type||manualType,result:result.action_result||manualResult,summary:result.action_summary||memo,date:actionDate,time:actionTime,nextDate,nextTime:result.next_action_time||"",next:result.next_action_memo||"",ts:new Date().toISOString(),recorded_by:(()=>{try{return JSON.parse(localStorage.getItem("current_user_v2")||"{}").name||"";}catch{return "";}})()};
    onUpdate(lead.id,{actions:[...(lead.actions||[]),newAct],next_action_date:nextDate,next_action_time:result.next_action_time||lead.next_action_time||"",next_action:result.next_action_memo||lead.next_action||""});
    setSaved(true);setTimeout(()=>setSaved(false),3000);
  };

  const iLvColor={"高":"#10b981","中":"#f59e0b","低":"#ef4444"};

        <div>

        </div>
        <div style={{marginLeft:"auto"}}>
          {apiKey?<div style={{background:"#10b98122",border:"1px solid #10b98144",borderRadius:8,padding:"6px 14px",fontSize:12,color:"#34d399"}}>✅ APIキー設定済み</div>:<div style={{background:"#ef444422",border:"1px solid #ef444444",borderRadius:8,padding:"6px 14px",fontSize:12,color:"#f87171"}}>⚠️ APIキー未設定</div>}
        </div>
      </div>
      <div style={{display:"flex",height:"calc(100vh - 77px)"}}>

function SettingsPage({ aiConfig, onSave }) {
  const [master, setMaster] = React.useState(() => getMaster());
  const [tab, setTab] = React.useState("portal");
  const [msg, setMsg] = React.useState("");

  const save = (next) => { setMaster(next); saveMasterSettings(next); setMsg("保存しました ✓"); setTimeout(()=>setMsg(""),2000); };

  const [newSite, setNewSite] = React.useState("");
  const addSite = () => {
    const s = newSite.trim(); if (!s) return;
    if (master.portalSites.includes(s)) { alert("既に存在します"); return; }
    const pt = { ...master.portalTypes, [s]: [{ label:"一括請求", price:10000 }] };
    save({ ...master, portalSites: [...master.portalSites, s], portalTypes: pt });
    setNewSite("");
  };
  const removeSite = (s) => {
    if (!window.confirm(`「${s}」を削除しますか？`)) return;
    const sites = master.portalSites.filter(x=>x!==s);
    const pt = { ...master.portalTypes }; delete pt[s];
    save({ ...master, portalSites: sites, portalTypes: pt });
  };
  const [selSite, setSelSite] = React.useState(master.portalSites[0]||"");
  const [newPlan, setNewPlan] = React.useState({ label:"", price:"" });
  const addPlan = () => {
    const l = newPlan.label.trim(), p = parseInt(newPlan.price);
    if (!l || isNaN(p)) { alert("プラン名と金額を入力してください"); return; }
    const plans = [...(master.portalTypes[selSite]||[]), { label:l, price:p }];
    save({ ...master, portalTypes: { ...master.portalTypes, [selSite]: plans } });
    setNewPlan({ label:"", price:"" });
  };
  const removePlan = (site, idx) => {
    const plans = (master.portalTypes[site]||[]).filter((_,i)=>i!==idx);
    save({ ...master, portalTypes: { ...master.portalTypes, [site]: plans } });
  };
  const updatePlanPrice = (site, idx, price) => {
    const plans = (master.portalTypes[site]||[]).map((p,i)=>i===idx?{...p,price:parseInt(price)||0}:p);
    save({ ...master, portalTypes: { ...master.portalTypes, [site]: plans } });
  };
  const [newSales, setNewSales] = React.useState("");
  const addSales = () => {
    const s = newSales.trim(); if (!s) return;
    if (master.salesMembers.includes(s)) { alert("既に存在します"); return; }
    save({ ...master, salesMembers: [...master.salesMembers, s] });
    setNewSales("");
  };
  const removeSales = (m) => { save({ ...master, salesMembers: master.salesMembers.filter(x=>x!==m) }); };

  const tabBtn = (key, label) => (
    <button onClick={()=>setTab(key)} style={{padding:"7px 18px",borderRadius:"8px 8px 0 0",border:"1px solid #d8ede1",borderBottom: tab===key ? "1px solid #fff" : "1px solid #d8ede1", background: tab===key ? "#fff" : "#f0f5f2", color: tab===key ? "#174f35" : "#6a9a7a", fontWeight: tab===key ? 700 : 400, fontSize:12, cursor:"pointer", fontFamily:"inherit", marginRight:4, marginBottom:-1}}>
      {label}
    </button>
  );
  const inp = { width:"100%", padding:"7px 10px", borderRadius:7, border:"1px solid #c0dece", fontSize:12, outline:"none", boxSizing:"border-box", fontFamily:"inherit", background:"#fff", color:"#174f35" };
  const addRow = { display:"flex", gap:8, marginBottom:12 };

  return (
    <div style={{padding:"24px 28px"}}>
      <div style={{fontSize:17,fontWeight:900,color:"#174f35",marginBottom:4}}>⚙️ マスタ管理</div>
      <div style={{fontSize:12,color:"#6a9a7a",marginBottom:20}}>ポータルサイト・プラン・営業担当・APIキーを管理できます。</div>
      {msg && <div style={{background:"#d1fae5",color:"#059669",border:"1px solid #6ee7b7",borderRadius:8,padding:"8px 16px",marginBottom:16,fontSize:12,fontWeight:700}}>{msg}</div>}
      <div style={{marginBottom:0}}>{tabBtn("portal","🏢 ポータルサイト")}{tabBtn("sales","👤 営業担当")}{tabBtn("apikey","🔑 APIキー設定")}</div>
      <div style={{background:"#fff",borderRadius:"0 8px 8px 8px",border:"1px solid #d8ede1",padding:"20px"}}>
        {tab === "portal" && (
          <div>
            <div style={{fontSize:12,fontWeight:700,color:"#174f35",marginBottom:8}}>ポータルサイト一覧</div>
            <div style={addRow}>
              <input value={newSite} onChange={e=>setNewSite(e.target.value)} placeholder="新しいポータルサイト名" style={{...inp, flex:1}} onKeyDown={e=>e.key==="Enter"&&addSite()} />
              <button onClick={addSite} style={{padding:"7px 16px",borderRadius:7,border:"none",background:"linear-gradient(135deg,#10b981,#059669)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>追加</button>
            </div>
            {master.portalSites.map(site => (
              <div key={site} style={{background:"#f8fbf9",borderRadius:10,border:"1px solid #e2f0e8",marginBottom:12,overflow:"hidden"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"#f0f5f2",borderBottom:"1px solid #e2f0e8"}}>
                  <span style={{fontWeight:700,color:"#174f35",fontSize:13}}>🏢 {site}</span>
                  <button onClick={()=>removeSite(site)} style={{fontSize:11,padding:"3px 10px",borderRadius:6,background:"#fef2f2",color:"#dc2626",border:"1px solid #fca5a5",cursor:"pointer",fontFamily:"inherit"}}>削除</button>
                </div>
                <div style={{padding:"12px 14px"}}>
                  <div style={{fontSize:11,color:"#6a9a7a",marginBottom:8,fontWeight:600}}>プラン・金額</div>

                    <div key={idx} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                      <span style={{fontSize:12,color:"#174f35",fontWeight:600,minWidth:120}}>{plan.label}</span>

function SVGBarChart({ data, keys, colors, height=200 }) {
  const [tooltip, setTooltip] = React.useState(null);
  if (!data.length) return null;
  const maxVal = Math.max(...data.flatMap(d => keys.map(k => d[k]||0)), 1);
  const padL=36,padR=12,padT=16,padB=28,W=560,H=height;
  const chartW=W-padL-padR, chartH=H-padT-padB;
  const groupW=chartW/data.length;
  const barW=Math.max(6,Math.min(30,groupW/keys.length-5));
  const yTicks=[0,0.25,0.5,0.75,1].map(r=>Math.round(maxVal*r));
  return (
    <div style={{position:"relative",width:"100%"}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block"}}>
        {yTicks.map((v,i)=>{const y=padT+chartH-(v/maxVal)*chartH; return <g key={i}><line x1={padL} x2={W-padR} y1={y} y2={y} stroke={i===0?"#c0dece":"#e8f5ee"} strokeWidth={i===0?1.5:1} strokeDasharray={i===0?"":"4 3"}/><text x={padL-5} y={y+4} textAnchor="end" fontSize={9} fill="#9ca3af">{v}</text></g>;})}
        {data.map((d,di)=>{
          const gx=padL+di*groupW+groupW/2;
          const tw=barW*keys.length+(keys.length-1)*4;
          return <g key={di}>
            {keys.map((k,ki)=>{const val=d[k]||0;const bh=Math.max((val/maxVal)*chartH,val>0?3:0);const x=gx-tw/2+ki*(barW+4);const y=padT+chartH-bh;return <rect key={k} x={x} y={y} width={barW} height={bh} fill={colors[k]} rx={3} style={{cursor:"pointer"}} onMouseEnter={e=>setTooltip({x:e.clientX,y:e.clientY,label:d.month,key:k,val})} onMouseLeave={()=>setTooltip(null)}/>;})};
            <text x={gx} y={H-padB+14} textAnchor="middle" fontSize={10} fill="#6a9a7a">{d.month}</text>
          </g>;
        })}
      </svg>
      <div style={{display:"flex",gap:14,flexWrap:"wrap",marginTop:6,paddingLeft:padL}}>
        {keys.map(k=><div key={k} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#6a9a7a"}}><span style={{width:12,height:12,borderRadius:3,background:colors[k],display:"inline-block"}}/>{k}</div>)}
      </div>
      {tooltip&&<div style={{position:"fixed",left:tooltip.x+12,top:tooltip.y-30,background:"#fff",border:"1px solid #e2f0e8",borderRadius:8,padding:"6px 12px",fontSize:12,color:"#174f35",pointerEvents:"none",zIndex:9999,boxShadow:"0 4px 12px #0002"}}><b>{tooltip.label}</b> / {tooltip.key}: <b>{tooltip.val}</b></div>}
    </div>
  );
}

function SVGLineChart({ data, keys, colors, height=200 }) {
  const [tooltip, setTooltip] = React.useState(null);
  if (!data.length) return null;
  const maxVal=Math.max(...data.flatMap(d=>keys.map(k=>d[k]||0)),1);
  const padL=36,padR=12,padT=16,padB=28,W=560,H=height;
  const chartW=W-padL-padR,chartH=H-padT-padB;
  const xStep=data.length>1?chartW/(data.length-1):chartW;
  const px=i=>padL+(data.length>1?i*xStep:chartW/2);
  const py=v=>padT+chartH-(v/maxVal)*chartH;
  const yTicks=[0,0.25,0.5,0.75,1].map(r=>Math.round(maxVal*r));
  return (
    <div style={{position:"relative",width:"100%"}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block"}}>
        {yTicks.map((v,i)=>{const y=py(v);return <g key={i}><line x1={padL} x2={W-padR} y1={y} y2={y} stroke={i===0?"#c0dece":"#e8f5ee"} strokeWidth={i===0?1.5:1} strokeDasharray={i===0?"":"4 3"}/><text x={padL-5} y={y+4} textAnchor="end" fontSize={9} fill="#9ca3af">{v}</text></g>;})}
        {keys.map(k=>{
          const pts=data.map((d,i)=>`${px(i)},${py(d[k]||0)}`).join(" ");
          return <g key={k}>
            <polyline points={pts} fill="none" stroke={colors[k]} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
            {data.map((d,i)=><circle key={i} cx={px(i)} cy={py(d[k]||0)} r={4} fill={colors[k]} stroke="#fff" strokeWidth={1.5} style={{cursor:"pointer"}} onMouseEnter={e=>setTooltip({x:e.clientX,y:e.clientY,label:d.month,key:k,val:d[k]||0})} onMouseLeave={()=>setTooltip(null)}/>)}
          </g>;
        })}
        {data.map((d,i)=><text key={i} x={px(i)} y={H-padB+14} textAnchor="middle" fontSize={10} fill="#6a9a7a">{d.month}</text>)}
      </svg>
      <div style={{display:"flex",gap:14,flexWrap:"wrap",marginTop:6,paddingLeft:padL}}>
        {keys.map(k=><div key={k} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#6a9a7a"}}><span style={{width:18,height:3,background:colors[k],display:"inline-block",borderRadius:2}}/>{k}</div>)}
      </div>
      {tooltip&&<div style={{position:"fixed",left:tooltip.x+12,top:tooltip.y-30,background:"#fff",border:"1px solid #e2f0e8",borderRadius:8,padding:"6px 12px",fontSize:12,color:"#174f35",pointerEvents:"none",zIndex:9999,boxShadow:"0 4px 12px #0002"}}><b>{tooltip.label}</b> / {tooltip.key}: <b>{tooltip.val}</b></div>}
    </div>
  );
}

function Trend({ leads }) {
  const normYM=s=>{if(!s)return"";if(/^\d{4}-\d{2}/.test(s))return s.slice(0,7);const m=s.match(/^(\d{4})[\/-](\d{1,2})/);return m?m[1]+"-"+m[2].padStart(2,"0"):"";};
  const months=[...new Set(leads.map(l=>normYM(l.date)).filter(Boolean))].sort();
  const data=months.map(m=>{
    const fl=leads.filter(l=>normYM(l.date)===m);
    return { month:m.slice(5)+"月", 反響数:fl.length, 商談数:fl.filter(l=>["日程調整中","商談確定"].includes(l.status)).length, MQL数:fl.filter(l=>l.mql==="MQL").length, HP:fl.filter(l=>l.source==="HP").length, ポータル:fl.filter(l=>l.source==="ポータルサイト").length, 電話:fl.filter(l=>l.source==="電話").length };
  });
  if (data.length===0) return (
    <div style={{padding:"24px 28px"}}>
      <div style={{fontSize:17,fontWeight:900,color:"#174f35",marginBottom:16}}>📈 月別推移レポート</div>
      <div style={{textAlign:"center",padding:60,color:"#6a9a7a",background:"#fff",borderRadius:14,border:"1px solid #e2f0e8"}}>
        <div style={{fontSize:36,marginBottom:12}}>📊</div>
        <div style={{fontSize:14,fontWeight:600}}>まだデータがありません</div>
        <div style={{fontSize:12,marginTop:6}}>リードを登録すると月別推移が表示されます</div>
      </div>
    </div>
  );
  const latest=data[data.length-1], prev=data[data.length-2];
  const diffBadge=(key)=>{
    if(!prev) return null;
    const d=latest[key]-prev[key];
    return <span style={{fontSize:11,fontWeight:700,marginLeft:6,color:d>0?"#10b981":d<0?"#ef4444":"#9ca3af"}}>{d>0?"+":""}{d}件</span>;
  };
  return (
    <div style={{padding:"24px 28px"}}>
      <div style={{fontSize:17,fontWeight:900,color:"#174f35",marginBottom:20}}>📈 月別推移レポート</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
        <div style={{background:"#fff",borderRadius:14,padding:"18px 20px",border:"1px solid #e2f0e8"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#174f35",marginBottom:12}}>📊 反響数・商談数・MQL数</div>
          <SVGBarChart data={data} keys={["反響数","商談数","MQL数"]} colors={{"反響数":"#10b981","商談数":"#f59e0b","MQL数":"#8b5cf6"}} height={200}/>
        </div>
        <div style={{background:"#fff",borderRadius:14,padding:"18px 20px",border:"1px solid #e2f0e8"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#174f35",marginBottom:12}}>📉 流入元別推移</div>
          <SVGLineChart data={data} keys={["HP","ポータル","電話"]} colors={{"HP":"#0ea5e9","ポータル":"#8b5cf6","電話":"#f59e0b"}} height={200}/>
        </div>
      </div>
      <div style={{background:"#fff",borderRadius:14,padding:"18px 20px",border:"1px solid #e2f0e8",overflowX:"auto"}}>
        <div style={{fontSize:13,fontWeight:700,color:"#174f35",marginBottom:12}}>📋 月別詳細データ</div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"#f0f5f2"}}>
            {["月","反響数","商談数","商談化率","MQL数","MQL率","HP","ポータル","電話"].map(h=>(
              <th key={h} style={{padding:"8px 12px",textAlign:"center",color:"#6a9a7a",fontWeight:700,borderBottom:"1px solid #e2f0e8",whiteSpace:"nowrap"}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {[...data].reverse().map((d,i)=>{
              const isLatest=i===0;
              return <tr key={i} style={{borderBottom:"1px solid #f0f5f2",background:isLatest?"#f0fdf4":i%2===0?"#fff":"#f8fbf9"}}>
                <td style={{padding:"8px 12px",textAlign:"center",fontWeight:700,color:"#174f35"}}>{d.month}{isLatest&&<span style={{fontSize:9,marginLeft:4,background:"#10b981",color:"#fff",borderRadius:3,padding:"1px 4px"}}>最新</span>}</td>
                <td style={{padding:"8px 12px",textAlign:"center",color:"#10b981",fontWeight:700}}>{d.反響数}</td>
                <td style={{padding:"8px 12px",textAlign:"center",color:"#f59e0b",fontWeight:700}}>{d.商談数}</td>
                <td style={{padding:"8px 12px",textAlign:"center",color:"#d97706"}}>{d.反響数?Math.round(d.商談数/d.反響数*100):0}%</td>
                <td style={{padding:"8px 12px",textAlign:"center",color:"#8b5cf6",fontWeight:700}}>{d.MQL数}</td>
                <td style={{padding:"8px 12px",textAlign:"center",color:"#7c3aed"}}>{d.反響数?Math.round(d.MQL数/d.反響数*100):0}%</td>
                <td style={{padding:"8px 12px",textAlign:"center",color:"#0ea5e9"}}>{d.HP}</td>
                <td style={{padding:"8px 12px",textAlign:"center",color:"#8b5cf6"}}>{d.ポータル}</td>
                <td style={{padding:"8px 12px",textAlign:"center",color:"#f59e0b"}}>{d.電話}</td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function App() {
  const [page, setPage] = useState("dashboard");
  const [dashFilter, setDashFilter] = useState(null);
  const [leads, setLeads] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [currentUser, setCurrentUser] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("current_user_v2") || "null");
      if (saved) { USER_COLORS[saved.name] = saved.color; return saved; }
      return null;
    } catch { return null; }
  });
  const [showAccountMgr, setShowAccountMgr] = useState(false);
  const selectUser = (account) => {
    setCurrentUser(account);
    USER_COLORS[account.name] = account.color;
    try { localStorage.setItem("current_user_v2", JSON.stringify(account)); } catch {}
  };
  const logout = () => {
    setCurrentUser(null);
    try { localStorage.removeItem("current_user_v2"); } catch {}
  };
  const updateMyColor = (color) => {
    const updated = { ...currentUser, color };
    setCurrentUser(updated);
    USER_COLORS[updated.name] = color;
    IS_COLORS[updated.name] = { bg: color, text: color,border: color + "55" };
    try { localStorage.setItem("current_user_v2", JSON.stringify(updated)); } catch {}
    const accounts = loadAccounts();
    const newAccounts = accounts.map(a => a.id === updated.id ? { ...a, color } : a);
    saveAccounts(newAccounts);
  };
  const [candidateSlots, setCandidateSlots] = useState([]);
  const [aiConfig, setAiConfig] = useState(() => {
    try { return JSON.parse(localStorage.getItem("ai_config") || "{}"); } catch { return {}; }
  });
  const apiKey = aiConfig.geminiKey || "";
  const saveAiConfig = (cfg) => {
    setAiConfig(cfg);
    try { localStorage.setItem("ai_config", JSON.stringify(cfg)); } catch {}
  };

  useEffect(() => { loadLeads().then(l => {
    const migrated = l.map(lead => lead.portal_type === "請求" ? { ...lead, portal_type: "一括請求" } : lead);
    setLeads(migrated); setLoaded(true);
    if (migrated.some((lead,i) => lead.portal_type !== l[i].portal_type)) saveLeads(migrated);
  }); }, []);

  const mut = (next) => { setLeads(next); saveLeads(next); };
  const addLead    = (l)       => mut([l, ...leads]);
  const updateLead = (id, p)   => mut(leads.map(l => l.id === id ? { ...l, ...p } : l));
  const deleteLead = (id)      => mut(leads.filter(l => l.id !== id));
  const addAction  = (id, act) => mut(leads.map(l => l.id === id
    ? { ...l, actions: [{ ...act, recorded_by: currentUser?.name || "" }, ...(l.actions || [])] } : l));

  if (!loaded) return <Splash />;
  if (!currentUser) return <LoginScreen onLogin={selectUser} />;

  return (
    <div style={S.root}>
      <style>{CSS}</style>
      <Nav page={page} setPage={setPage} count={leads.length} currentUser={currentUser} onLogout={logout} onAccountMgr={currentUser?.role==="admin" ? ()=>setShowAccountMgr(true) : null} onUpdateColor={updateMyColor} />
      <main style={S.main}>
        {page === "dashboard" && <Dashboard leads={leads} currentUser={currentUser} onNavigate={(f)=>{ setDashFilter(f); setPage("leads"); }} />}
        {page === "trend"     && <Trend leads={leads} />}
        {page === "leads"     && <LeadList leads={leads} initialFilter={dashFilter} onFilterConsumed={()=>setDashFilter(null)} onAdd={addLead} onUpdate={updateLead} onDelete={deleteLead} onAddAction={addAction}
          onBulkAdd={newLeads => { const next = [...newLeads, ...leads]; setLeads(next); saveLeads(next); }} />}
        {page === "ai"        && <AIPage leads={leads} onAdd={addLead} onUpdate={updateLead} onAddAction={addAction} goLeads={() => setPage("leads")} goCalendar={() => setPage("calendar")} aiConfig={aiConfig} />}
        {page === "calendar"  && <CalendarPage candidateSlots={candidateSlots} onSlotsChange={setCandidateSlots} onGoEmail={()=>setPage("email")} />}
        {page === "settings"  && <SettingsPage aiConfig={aiConfig} onSave={saveAiConfig} />}
        {page === "email"     && <EmailPage leads={leads} onUpdate={updateLead} currentUser={currentUser} candidateSlots={candidateSlots} />}
      </main>
      {showAccountMgr && <AccountManager currentUser={currentUser} onClose={()=>setShowAccountMgr(false)} />}
    </div>
  );
}

      <div style={{display:"flex",flexDirection:"column", gap:1, width:"100%", alignItems:"center", flex:1}}>

              ↩ ログアウト
            </button>
          </div>
        )}
      </div>
    </nav>
  );
}

function Dashboard({ leads, currentUser, onNavigate }) {
  // 日付を "YYYY-MM" 形式に正規化（スラッシュ・ハイフン両対応）
  const toYM = (dateStr) => {
    if (!dateStr) return "";
    // "2026-03-11" → "2026-03"
    if (/^\d{4}-\d{2}/.test(dateStr)) return dateStr.slice(0,7);
    // "2026/3/11" or "2026/03/11" → "2026-03"
    const m = dateStr.match(/^(\d{4})[/-](\d{1,2})/);
    if (m) return m[1] + "-" + String(m[2]).padStart(2,"0");
    return "";
  };
  const [month, setMonth] = useState(THIS_MONTH);
  const months = useMemo(() => {
    const set = new Set(leads.map(l => toYM(l.date)).filter(Boolean));
    return [...set].sort().reverse();
  }, [leads]);
  useEffect(() => {
    if (months.length > 0 && !months.includes(month)) setMonth(months[0]);
  }, [months]);
  const fl = month ? leads.filter(l => toYM(l.date) === month) : leads;

  const bySrc    = s => fl.filter(l => l.source === s);
  const isAppt   = l => ["日程調整中","商談確定"].includes(l.status);
  const isWon    = l => l.status === "商談確定";
  const rate     = (a,b) => b ? (a/b*100).toFixed(1)+"%" : "—";

  const portal   = bySrc("ポータルサイト");
  const isCharged = l => !l.charge_applied;
  const cost     = portal.filter(isCharged).reduce((s,l) => s + getPortalPrice(l.portal_site, l.portal_type), 0);
  const applied  = portal.filter(l => l.charge_applied);

  const todayActions = leads.filter(l => l.next_action_date === TODAY && l.is_member === currentUser?.name);
  const overdueActions = leads.filter(l => l.next_action_date && l.next_action_date < TODAY && l.is_member === currentUser?.name);

  const kpiItems = [
    { icon:"📥", label:"総反響数",   value:fl.length+"件",          color:"#10b981", bg:"linear-gradient(135deg,#0ecf8a,#059669)", sub:`MQL ${fl.filter(l=>l.mql==="MQL").length}件 (${rate(fl.filter(l=>l.mql==="MQL").length, fl.length)})`, filter:{ month } },
    { icon:"📅", label:"商談設定数", value:fl.filter(isAppt).length+"件",color:"#f59e0b", bg:"linear-gradient(135deg,#fbbf24,#d97706)", sub:`商談化率 ${rate(fl.filter(isAppt).length, fl.length)}`, filter:{ month, statuses:["日程調整中","商談確定"] } },
    { icon:"📒", label:"課金見込み", value:"¥"+cost.toLocaleString(),color:"#8b5cf6", bg:"linear-gradient(135deg,#a78bfa,#7c3aed)", sub:`対象外申請済 ${applied.length}件`, filter:{ month, source:"ポータルサイト" } },
    { icon:"🔥", label:"本日追客",   value:todayActions.length+"件",color:"#0ea5e9", bg:"linear-gradient(135deg,#38bdf8,#0369a1)", sub:`期限切れ ${overdueActions.length}件`, filter:{ nextActionDate: TODAY } },
  ];

  return (
    <div style={{padding:"14px 20px", height:"calc(100vh - 60px)", display:"flex", flexDirection:"column", gap:10, overflow:"hidden"}}>
      {/* ヘッダー */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center", flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:17,fontWeight:900,color:"#174f35"}}>ダッシュボード</div>
          <div style={{fontSize:11,color:"#6a9a7a"}}>月次・流入元別レポート</div>
        </div>
        <select value={month} onChange={e=>setMonth(e.target.value)} style={{...S.sel,fontSize:12}}>
          {months.length===0 && <option value={THIS_MONTH}>{THIS_MONTH.slice(0,4)}年{parseInt(THIS_MONTH.slice(5))}月</option>}
          {months.map(m=><option key={m} value={m}>{m.slice(0,4)}年{parseInt(m.slice(5))}月</option>)}
        </select>
      </div>

      {/* KPI グラデカード */}
      <div style={{display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, flexShrink:0}}>
        {kpiItems.map((k,i) => (
          <div key={i} onClick={()=>onNavigate&&onNavigate(k.filter)} style={{borderRadius:16, overflow:"hidden", boxShadow:"0 6px 20px "+k.color+"44", position:"relative", cursor:"pointer", transition:"transform 0.1s, box-shadow 0.1s"}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 10px 28px "+k.color+"66"}} onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="0 6px 20px "+k.color+"44"}}>

            <div style={{background:k.bg,padding:"12px 16px 10px", position:"relative"}}>

const CSV_COLUMNS = {
  "会社名":               "company",
  "担当者名":             "contact",
  "反響日":               "date",
  "流入元":               "source",
  "ポータルサイト名":     "portal_site",
  "ポータル種別":         "portal_type",
  "課金対象外申請済":     "charge_applied",
  "ステータス":           "status",
  "IS担当":               "is_member",
  "商談日":               "meeting_date",
  "商談時刻":             "meeting_time",
  "担当営業":             "sales_member",
  "Zoho CRM URL":         "zoho_url",
  "ネクストアクション日": "next_action_date",
  "ネクストアクション時刻":"next_action_time",
  "ネクストアクションメモ":"next_action",
  "MQL判定":              "mql",
};

function parseCSVLine(line) {
  const fields = []; let cur = ""; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === "," && !inQ) { fields.push(cur.trim()); cur = ""; }
    else { cur += c; }
  }
  fields.push(cur.trim());
  return fields;
}

// 日付を YYYY-MM-DD に正規化
function normalizeDate(s) {
  if (!s) return "";
  s = s.trim();
  // 既に YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // YYYY/M/D or YYYY-M-D
  const m = s.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})$/);
  if (m) return `${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`;
  return s;
}

function parseCSV(text) {
  const lines = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n").filter(l=>l.trim());
  if (lines.length < 1) return { leads:[], errors:["データがありません"] };

  let headerIdx = lines.findIndex(l => l.includes("会社名"));

  const FIXED_COLS = ["company","contact","date","source","portal_site","portal_type",
    "charge_applied","status","is_member","mql","meeting_date","meeting_time",
    "sales_member","zoho_url","next_action_date","next_action_time","next_action"];

  const leads = []; const errors = [];

  if (headerIdx < 0) {
    for (let i = 0; i < lines.length; i++) {
      const vals = parseCSVLine(lines[i]);
      if (!vals[0] || vals[0].includes("フォーマット") || vals[0].startsWith("★") || vals[0].startsWith("会社名")) continue;
      const row = {};
      FIXED_COLS.forEach((k,j) => { row[k] = (vals[j]||"").trim(); });
      if (!row.company) continue;
      row.id = uid(); row.actions = [];
      row.charge_applied = row.charge_applied === "TRUE" || row.charge_applied === "true";
      if (!STATUSES.includes(row.status)) row.status = "新規";
      if (!MQL_OPTIONS.includes(row.mql)) row.mql = "非MQL";
      row.date = normalizeDate(row.date);
      row.next_action_date = normalizeDate(row.next_action_date);
      row.meeting_date = normalizeDate(row.meeting_date);
      leads.push(row);
    }
    if (leads.length === 0) return { leads:[], errors:["データ行が見つかりません。フォーマットのヘッダー行（会社名・担当者名…）が必要です"] };
    return { leads, errors };
  }

  const headers = parseCSVLine(lines[headerIdx]).map(h => h.replace(" ★",""));
  for (let i = headerIdx+1; i < lines.length; i++) {
    const vals = parseCSVLine(lines[i]);
    const row = {};
    headers.forEach((h,j) => { const key = CSV_COLUMNS[h]; if (key) row[key] = (vals[j]||"").trim(); });
    if (!row.company) { errors.push(`${i+1}行目: 会社名が空のためスキップ`); continue; }
    row.id = uid(); row.actions = [];
    row.charge_applied = row.charge_applied === "TRUE" || row.charge_applied === "true";
    if (!STATUSES.includes(row.status)) row.status = "新規";
    if (!MQL_OPTIONS.includes(row.mql)) row.mql = "非MQL";
    row.date = normalizeDate(row.date);
    row.next_action_date = normalizeDate(row.next_action_date);
    row.meeting_date = normalizeDate(row.meeting_date);
    leads.push(row);
  }
  return { leads, errors };
}

function CSVImport({ onImport, onClose, result }) {
  const [preview, setPreview] = useState(null);
  const [errors,  setErrors]  = useState([]);
  const [dragging,setDragging]= useState(false);
  const [encoding,setEncoding]= useState("");

  const handleFile = (file) => {
    if (!file) return;
    const binReader = new FileReader();
    binReader.onload = e => {
      const buf = e.target.result;
      const bytes = new Uint8Array(buf);
      const isUTF8BOM = bytes[0]===0xEF && bytes[1]===0xBB && bytes[2]===0xBF;
      let sjisScore = 0;
      for (let i = 0; i < Math.min(bytes.length, 500); i++) {
        const b = bytes[i];
        if ((b >= 0x81 && b <= 0x9F) || (b >= 0xE0 && b <= 0xFC)) sjisScore++;
      }
      const enc = isUTF8BOM ? "UTF-8" : sjisScore > 3 ? "Shift-JIS" : "UTF-8";
      const txtReader = new FileReader();
      txtReader.onload = ev => {
        const { leads, errors } = parseCSV(ev.target.result);
        setPreview(leads); setErrors(errors);
        setEncoding(enc);
      };
      txtReader.readAsText(file, enc);
    };
    binReader.readAsArrayBuffer(file);
  };

  return (
    <div style={S.importPanel}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:14,color:"#174f35"}}>📥 CSVインポート</div>

            const note = "# 流入元: HP / ポータルサイト / 電話  |  ステータス: 新規 / 架電済 / 日程調整中 / 商談確定 / 育成対象外 / ナーチャリング";
            const csv = "\uFEFF" + note + "\n" + header + "\n" + example;
            const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = "dandori_import_template.csv"; a.click();
            URL.revokeObjectURL(url);
          }}
            style={{fontSize:11,padding:"5px 12px",borderRadius:7,border:"1px solid #10b98155", background:"#ecfdf5",color:"#059669",cursor:"pointer",fontFamily:"inherit",fontWeight:600, display:"flex",alignItems:"center", gap:4}}>
            ⬇️ テンプレDL
          </button>
          <button onClick={onClose} style={S.closeX}>✕</button>
        </div>
      </div>

      {!preview && !result && (
        <div
          onDragOver={e=>{e.preventDefault();setDragging(true);}}
          onDragLeave={()=>setDragging(false)}
          onDrop={e=>{e.preventDefault();setDragging(false);handleFile(e.dataTransfer.files[0]);}}
          style={{border:`2px dashed ${dragging?"#10b981":"#c0dece"}`,borderRadius:10, padding:"32px 20px", textAlign:"center",background: dragging?"#d1fae522":"transparent", cursor:"pointer", transition:"all 0.15s"}}
          onClick={()=>document.getElementById("csv-input").click()}>
          <div style={{fontSize:32,marginBottom:8}}>📂</div>
          <div style={{fontSize:14,color:"#2d6b4a"}}>CSVファイルをドロップ</div>
          <div style={{fontSize:12,color:"#3d7a5e", marginTop:4}}>またはクリックしてファイルを選択</div>
          <input id="csv-input" type="file" accept=".csv" style={{display:"none"}}
            onChange={e=>handleFile(e.target.files[0])} />
        </div>
      )}

      {encoding && (
        <div style={{fontSize:11,color: encoding==="Shift-JIS"?"#f59e0b":"#10b981", marginTop:6}}>
          {encoding==="Shift-JIS" ? "⚠️ Shift-JIS形式を自動変換しました" : "✅ UTF-8形式で読み込みました"}
        </div>
      )}

      {errors.length > 0 && (
        <div style={{marginTop:10,background:"#fef2f2",border:"1px solid #ef444433",borderRadius:7,padding:"10px 12px"}}>
          <div style={{fontSize:12,color:"#ef4444",fontWeight:700,marginBottom:4}}>⚠️ 警告（スキップされた行）</div>
          {errors.map((e,i)=><div key={i} style={{fontSize:12,color:"#f87171"}}>{e}</div>)}

      {preview && !result && (
        <div style={{marginTop:12}}>

                    </td>
                    <td style={{...S.td,fontSize:12}}>{l.is_member||"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{display:"flex", gap:8, justifyContent:"flex-end"}}>
            <button onClick={()=>{setPreview(null);setErrors([]);}} style={S.btnSec}>やり直す</button>
            <button onClick={()=>onImport(preview)} style={S.btnP}>
              ✅ {preview.length}件をインポートする
            </button>
          </div>
        </div>
      )}

      {result && (
        <div style={{textAlign:"center",padding:"20px 0"}}>
          <div style={{fontSize:32,marginBottom:8}}>🎉</div>
          <div style={{fontSize:15,fontWeight:700,color:"#10b981"}}>{result.count}件のインポート完了！</div>

          {SOURCES.map(s => <option key={s}>{s}</option>)}
        </select>
        {fSource === "ポータルサイト" && (
          <select value={fPortal} onChange={e => setFPortal(e.target.value)} style={{...S.sel, flexShrink:0}}>
            <option value="">全サイト</option>
            {getPortalSites().map(p => <option key={p}>{p}</option>)}
          </select>
        )}
        <select value={fMonth} onChange={e => setFMonth(e.target.value)} style={{...S.sel, flexShrink:0}}>
          <option value="">全期間</option>
          {[...new Set(leads.map(l=>{ const s=l.date||""; if(/^\d{4}-\d{2}/.test(s))return s.slice(0,7); const m=s.match(/^(\d{4})[\/-](\d{1,2})/); return m?m[1]+"-"+m[2].padStart(2,"0"):""; }).filter(Boolean))].sort().reverse().map(m=><option key={m} value={m}>{m.slice(0,4)}年{parseInt(m.slice(5))}月</option>)}
        </select>
        <select value={fIS} onChange={e => setFIS(e.target.value)} style={{...S.sel, flexShrink:0}}>
          <option value="">全IS担当</option>
          {getISMembers().map(m => <option key={m}>{m}</option>)}
        </select>
      </div>
      {/* 2行目：並び順＋ステータス絞り込み */}
      <div style={{display:"flex", gap:4, alignItems:"center", marginBottom:16, flexWrap:"nowrap"}}>
        <span style={{fontSize:11,color:"#6a9a7a",flexShrink:0}}>並び順:</span>
        {[["fixed","標準"],["date","反響日"],["nextAction","追客日"]].map(([v,label]) => (
          <button key={v} onClick={() => {
            if (sort === v) { setSortDir(d => d === "asc" ? "desc" : "asc"); }
            else { setSort(v); setSortDir("asc"); }
          }} style={{fontSize:11,padding:"4px 10px",borderRadius:8,cursor:"pointer",fontFamily:"inherit", background: sort===v ? "#10b98122" : "transparent", color: sort===v ? "#059669" : "#3d7a5e", border: `1px solid ${sort===v ? "#10b98155" : "#c0dece"}`, fontWeight: sort===v ? 700 : 400}}>
            {label}{sort===v && v!=="fixed" ? (sortDir==="asc" ? " ↑" : " ↓") : ""}
          </button>
        ))}
        <span style={{fontSize:11,color:"#c0dece",flexShrink:0, margin:"0 4px"}}>|</span>
        <button onClick={()=>setFNextAction(v=>v==="today"?"":"today")} style={{fontSize:11,padding:"3px 9px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",flexShrink:0, background:fNextAction==="today"?"#ea580c33":"transparent", color:fNextAction==="today"?"#ea580c":"#3d7a5e", border:`1px solid ${fNextAction==="today"?"#ea580c66":"#c0dece"}`, fontWeight:fNextAction==="today"?700:400}}>🔥 本日追客</button>
        <span style={{fontSize:11,color:"#c0dece",flexShrink:0, margin:"0 4px"}}>|</span>
        <span style={{fontSize:11,color:"#6a9a7a",flexShrink:0}}>ステータス:</span>
        {STATUSES.map(s => {
          const active = fStatuses.has(s);
          const c = STATUS_COLORS[s]||"#6a9a7a";
          return (
            <button key={s} onClick={() => setFStatuses(prev => {
              const n = new Set(prev); active ? n.delete(s) : n.add(s); return n;
            })} style={{fontSize:11,padding:"3px 9px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",flexShrink:0, background: active ? c+"33" : "transparent", color: active ? c : "#3d7a5e", border: `1px solid ${active ? c+"66" : "#c0dece"}`, fontWeight: active ? 700 : 400}}>
              {s}
            </button>
          );
        })}
        {fStatuses.size > 0 && <button onClick={() => setFStatuses(new Set())}
          style={{fontSize:11,color:"#6a9a7a",background:"none",border:"none",cursor:"pointer",padding:"2px 4px",flexShrink:0,whiteSpace:"nowrap"}}>✕ クリア</button>}
      </div>
      </div>{/* /sticky */}

      {showImport && (
        <CSVImport
          onImport={(newLeads) => {
            onBulkAdd(newLeads);
            setImportResult({ count: newLeads.length });
          }}
          onClose={() => setShowImport(false)}
          result={importResult}
        />
      )}

      <div style={{display:"flex", gap:12, marginTop:16, height:"calc(100vh - 178px)"}}>
        {/* 左側：リード一覧 */}
        <div style={{flex:1, minWidth:0, overflowY:"auto"}}>
          <div style={{display:"flex", flexDirection:"column", gap:6}}>
            {list.length === 0 && <div style={{...S.empty,padding:"32px"}}>リードがありません</div>}
            {list.map(lead => (
              <LeadRow key={lead.id} lead={lead} openId={openId} setOpenId={setOpenId}
                onEdit={() => { setEditing(lead); setShowForm(true); }}
                onDelete={() => onDelete(lead.id)}
                onStatusChange={s => onUpdate(lead.id, { status: s })}
                onUpdate={p => onUpdate(lead.id, p)}
              />
            ))}
          </div>
        </div>

        {/* 右パネル：アクション履歴 */}
        {selectedLead && (
          <div style={{flex:1, minWidth:0, background:"#fff", border:"1px solid #e2f0e8", borderRadius:12, boxShadow:"0 2px 12px #0569690a", overflow:"hidden", height:"100%", overflowY:"auto"}}>
            <ActionHistoryPanel
              lead={selectedLead}
              onClose={() => setOpenId(null)}
              onUpdate={p => onUpdate(selectedLead.id, p)}
              onEditAction={(aid, updated) => {
                const newActions = (selectedLead.actions||[]).map(a => a.id === aid ? { ...a, ...updated } : a);
                const patch = { actions: newActions };
                if (updated.nextDate) { patch.next_action_date = updated.nextDate; patch.next_action_time = updated.nextTime||""; patch.next_action = updated.next||""; }
                onUpdate(selectedLead.id, patch);
              }}
              onDeleteAction={aid => {
                const remaining = (selectedLead.actions||[]).filter(a => a.id !== aid);
                const patch = { actions: remaining };
                if (remaining.length === 0) { patch.next_action = ""; patch.next_action_date = ""; patch.next_action_time = ""; }
                else { const latest = remaining.find(a => a.nextDate); if (!latest) { patch.next_action = ""; patch.next_action_date = ""; patch.next_action_time = ""; } }
                onUpdate(selectedLead.id, patch);
              }}
            />
          </div>
        )}
      </div>

      {showForm && (
        <LeadForm initial={editing}
          onSave={d => {
            editing ? onUpdate(editing.id, d) : onAdd({ id: uid(), date: TODAY, actions: [], ...d });
            setShowForm(false);
          }}
          onClose={() => setShowForm(false)} />
      )}
    </div>
  );
}

              <div style={{...S.nextActInline, flex:1}}>
                {overdue && <span style={{fontSize:11,background:"#ef4444",color:"#fff",borderRadius:4,padding:"1px 6px", marginRight:6,fontWeight:700}}>期限切れ</span>}
                {today   && <span style={{fontSize:11,background:"#059669",color:"#fff",borderRadius:4,padding:"1px 6px", marginRight:6,fontWeight:700}}>本日</span>}
                {soon && !today && !overdue && <span style={{fontSize:11,background:"#f97316",color:"#fff",borderRadius:4,padding:"1px 6px", marginRight:6,fontWeight:700}}>まもなく</span>}
                <span style={{color:dateColor, marginRight:4}}>→</span>
                {nad && <span style={{fontWeight:700, marginRight:4,color:dateColor}}>{nad}{lead.next_action_time ? " "+lead.next_action_time : ""}</span>}
                {lead.next_action && <span style={{color:"#174f35",fontSize:12}}>{lead.next_action}</span>}
              </div>
            )}
            {(nad || lead.next_action) && <NextActionEditBtn nad={nad} lead={lead} onUpdate={onUpdate} />}

          </div>
        );
      })()}

      {/* Always-visible: 商談情報 */}
      {(lead.meeting_date || lead.sales_member) && (
        <div style={{...S.meetingBar,padding:"5px 16px", borderTop:"1px solid #e8f5ee"}} onClick={e=>e.stopPropagation()}>
          <span style={{fontSize:12,color:"#10b981",fontWeight:700,flexShrink:0}}>🤝 商談</span>
          {lead.meeting_date && (
            <span style={{fontSize:12,color:"#0ea5e9"}}>
              {lead.meeting_date}{lead.meeting_time ? " " + lead.meeting_time : ""}
            </span>
          )}
          {lead.sales_member && (
            <span style={{fontSize:12,color:"#d97706",fontWeight:600}}>担当：{lead.sales_member}</span>
          )}
        </div>
      )}

    </div>
  );
}

const PALETTE = ["#7c3aed","#0369a1","#059669","#d97706","#dc2626","#0891b2","#db2777","#65a30d","#ea580c","#0f766e"];
const USER_COLORS = {};  // 動的に設定

const DEFAULT_ACCOUNTS = [
  { id:"shingai",  name:"新谷",   password:"1234", role:"admin",color:"#7c3aed", email:"" },
  { id:"kitahara",  name:"北原",   password:"1234", role:"member",color:"#0369a1", email:"" },
];

function loadAccounts() {
  try {
    const saved = JSON.parse(localStorage.getItem("is_accounts") || "null");
    if (!saved) {
      localStorage.setItem("is_accounts", JSON.stringify(DEFAULT_ACCOUNTS));
      return DEFAULT_ACCOUNTS;
    }
    let updated = [...saved];
    let changed = false;
    DEFAULT_ACCOUNTS.forEach(def => {
      if (!updated.some(a => a.id === def.id)) {
        updated = updated.filter(a => a.name !== def.name); // 同名の古いIDを削除
        updated.unshift(def);
        changed = true;
      }
    });
    if (changed) {
      localStorage.setItem("is_accounts", JSON.stringify(updated));
    }
    return updated;
  } catch { return DEFAULT_ACCOUNTS; }
}
function saveAccounts(accounts) {
  try { localStorage.setItem("is_accounts", JSON.stringify(accounts)); } catch {}
  accounts.forEach(a => {
    USER_COLORS[a.name] = a.color;
    IS_COLORS[a.name] = { bg: a.color, text: a.color,border: a.color + "55" };
  });
}

function addBusinessDays(dateStr, days) {
  const d = new Date((dateStr || TODAY) + "T00:00:00");
  let added = 0;
  while (added < days) {
    d.setDate(d.getDate() + 1);
    const dow = d.getDay();
    const ds = d.toISOString().split("T")[0];
    if (dow !== 0 && dow !== 6 && !JP_HOLIDAYS.has(ds)) added++;
  }
  return d.toISOString().split("T")[0];
}

function CalendarPage({ candidateSlots = [], onSlotsChange = ()=>{}, onGoEmail = ()=>{} }) {
  const [cfg, setCfg] = useState(() => loadGCalConfig());
  const [showSetup, setShowSetup] = useState(false);
  const [editCfg, setEditCfg] = useState(() => loadGCalConfig());

  // 検索条件
  const [selectedMembers, setSelectedMembers] = useState(["北原"]);
  const [dateFrom, setDateFrom] = useState(TODAY);
  const [dateTo, setDateTo]     = useState(() => {
    const d = new Date(TODAY + "T00:00:00"); d.setDate(d.getDate()+14);
    return d.toISOString().split("T")[0];
  });
  const [duration, setDuration] = useState(60);
  const [timeStart, setTimeStart] = useState("09:00");
  const [timeEnd,   setTimeEnd]   = useState("18:00");
  const [bufferBefore, setBufferBefore] = useState(30);
  const [bufferAfter,  setBufferAfter]  = useState(30);
  const [activeDays, setActiveDays] = useState([1,2,3,4,5]);
  const [includeHolidays, setIncludeHolidays] = useState(false);
  const [excludeTimes, setExcludeTimes] = useState([{from:"12:00",to:"13:00"}]);

  // 結果
  const [slots, setSlots]     = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState("");
  const [searched, setSearched] = useState(false);

  const isConfigured = cfg.apiKey && cfg.calendarIds && Object.keys(cfg.calendarIds).length > 0;

  // Google Calendar freebusy APIを叩く
  const search = async () => {
    if (!isConfigured) { setShowSetup(true); return; }
    setLoading(true); setError(""); setSlots([]); setSearched(false);

    try {
      const timeMin = dateFrom + "T00:00:00+09:00";
      const timeMax = dateTo   + "T23:59:59+09:00";

      // 対象メンバーのカレンダーIDを収集
      const items = selectedMembers
        .map(m => cfg.calendarIds[m])
        .filter(Boolean)
        .map(id => ({ id }));

      if (items.length === 0) { setError("選択したメンバーのカレンダーIDが設定されていません"); setLoading(false); return; }

      const res = await fetch(
        `https://www.googleapis.com/calendar/v3/freeBusy?key=${cfg.apiKey}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ timeMin, timeMax, items })
        }
      );
      if (!res.ok) {
        const e = await res.json();
        throw new Error(e.error?.message || "APIエラー");
      }
      const data = await res.json();

      // 各メンバーの busy 時間帯を収集
      const busyByMember = {};
      selectedMembers.forEach(m => {
        const calId = cfg.calendarIds[m];
        if (!calId) return;
        busyByMember[m] = (data.calendars[calId]?.busy || []).map(b => ({
          start: new Date(b.start), end: new Date(b.end)
        }));
      });

      // 空き時間スロットを生成
      const found = [];
      const from = new Date(dateFrom + "T00:00:00+09:00");
      const to   = new Date(dateTo   + "T23:59:59+09:00");
      const [sh, sm] = timeStart.split(":").map(Number);
      const [eh, em] = timeEnd.split(":").map(Number);
      const bufBefore = bufferBefore * 60000; // ms
      const bufAfter  = bufferAfter  * 60000; // ms

      let cur = new Date(from);
      while (cur <= to) {
        const jstDate = new Date(cur.getTime() + 9*60*60000);
        const dow = jstDate.getUTCDay();
        const ds  = jstDate.toISOString().split("T")[0];
        if (activeDays.includes(dow) && (!JP_HOLIDAYS.has(ds) || includeHolidays)) {
          // この日の稼働時間内でスロットを探す
          let slotStart = new Date(cur);
          slotStart.setHours(sh, sm, 0, 0);
          const dayEnd = new Date(cur);
          dayEnd.setHours(eh, em, 0, 0);

          while (slotStart.getTime() + duration * 60000 <= dayEnd.getTime()) {
            const slotEnd = new Date(slotStart.getTime() + duration * 60000);
            // バッファ込みの占有時間帯
            const checkStart = new Date(slotStart.getTime() - bufBefore);
            const checkEnd   = new Date(slotEnd.getTime()   + bufAfter);
            // 除外時間帯チェック
            const inExclude = excludeTimes.some(ex => {
              const [exSh,exSm]=ex.from.split(":").map(Number);
              const [exEh,exEm]=ex.to.split(":").map(Number);
              const exS=new Date(slotStart);exS.setHours(exSh,exSm,0,0);
              const exE=new Date(slotStart);exE.setHours(exEh,exEm,0,0);
              return slotStart<exE&&slotEnd>exS;
            });
            // OR検索：空いているメンバーを列挙
            const freeMembers = inExclude ? [] : selectedMembers.filter(m => {
              const busy = busyByMember[m] || [];
              return !busy.some(b => checkStart < b.end && checkEnd > b.start);
            });
            if (freeMembers.length > 0) {
              found.push({ date: ds, start: slotStart.toTimeString().slice(0,5), end: slotEnd.toTimeString().slice(0,5), members: freeMembers });
              // 次スロットは商談終了＋後バッファ後から
              slotStart = new Date(slotEnd.getTime() + bufAfter);
            } else {
              slotStart = new Date(slotStart.getTime() + 30 * 60000);
            }
          }
        }
        cur.setDate(cur.getDate() + 1);
      }

      setSlots(found);
      setSearched(true);
    } catch(e) {
      setError("エラー: " + e.message);
    } finally {
      setLoading(false);
    }
  };

  const copySlot = (slot) => {
    const txt = `${slot.date} ${slot.start}〜${slot.end}（${slot.members.join("・")}）`;
    navigator.clipboard?.writeText(txt).catch(()=>{});

  const isSlotSelected = (slot) => candidateSlots.some(s=>s.date===slot.date&&s.start===slot.start&&s.end===slot.end);
  const toggleCandidateSlot = (slot) => {
    if (isSlotSelected(slot)) {
      onSlotsChange(candidateSlots.filter(s=>!(s.date===slot.date&&s.start===slot.start&&s.end===slot.end)));
    } else if (candidateSlots.length < 3) {
      onSlotsChange([...candidateSlots, slot]);
    }
  };

  const members = getSalesMembers();
  const inp2 = { ...S.inp, marginBottom:0 };

  return (
    <div style={S.page}>
      <Header title="📅 商談候補日検索" sub="Google Calendarの空き時間を自動検索します">
        <button onClick={()=>{ setEditCfg(loadGCalConfig()); setShowSetup(v=>!v); }}

      </Header>

      {/* 設定パネル */}
      {showSetup && (
        <div style={{...S.card, marginBottom:16, border:"1px solid #fde68a", background:"#fffbeb"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#d97706",marginBottom:12}}>⚙️ Google Calendar API 設定</div>

          {/* 設定手順 */}
          <div style={{background:"#fff",border:"1px solid #fde68a",borderRadius:8,padding:"12px 14px",marginBottom:14,fontSize:12,color:"#92400e",lineHeight:1.8}}>
            <div style={{fontWeight:700,marginBottom:6}}>📋 設定手順</div>
            <div>① <a href="https://console.cloud.google.com/" target="_blank" rel="noopener noreferrer" style={{color:"#0284c7"}}>Google Cloud Console</a> でプロジェクトを作成</div>
            <div>② 「APIとサービス」→「ライブラリ」→ <b>Google Calendar API</b> を有効化</div>
            <div>③ 「認証情報」→「APIキーを作成」→ APIキーをコピー</div>
            <div>④ 各担当者のGoogleカレンダーを開き「設定」→「カレンダーのID」をコピー<br/>　　（例：<code style={{background:"#fef9c3",padding:"1px 4px",borderRadius:3}}>abcdef@gmail.com</code> または <code style={{background:"#fef9c3",padding:"1px 4px",borderRadius:3}}>xxx@group.calendar.google.com</code>）</div>
            <div>⑤ カレンダーの「共有設定」で <b>「一般公開して誰でも閲覧できるようにする」</b> をON（または「予定の詳細を表示」を許可）</div>
          </div>

          <div style={{marginBottom:10}}>
            <label style={{...S.lbl}}>Google Calendar APIキー</label>
            <input value={editCfg.apiKey||""} onChange={e=>setEditCfg(p=>({...p,apiKey:e.target.value}))}
              placeholder="AIzaSy..." style={inp2} />
          </div>

          <div style={{marginBottom:4}}>
            <label style={{...S.lbl}}>担当者ごとのカレンダーID</label>
